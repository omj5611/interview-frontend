<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>면접 일정 자동 매칭 시스템 v2</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F8FA;--card:#fff;--card2:#F2F4F6;--card3:#EAECEF;
  --border:#E5E8EB;--border2:#D1D5DB;
  --blue:#3182F6;--blue2:rgba(49,130,246,.08);--blue3:rgba(49,130,246,.16);
  --t1:#191919;--t2:#6B7280;--t3:#B0B8C1;--t4:#E5E8EB;
  --green:#17C964;--green2:rgba(23,201,100,.1);
  --red:#E85C5C;--red2:rgba(232,92,92,.1);
  --orange:#F59E0B;--orange2:rgba(245,158,11,.1);
  --purple:#7C3AED;--purple2:rgba(124,58,237,.1);
  --teal:#0891B2;--teal2:rgba(8,145,178,.1);
  --sh:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --sh2:0 4px 16px rgba(0,0,0,.08),0 12px 40px rgba(0,0,0,.06);
  --r:8px;--r2:12px;--r3:16px;
  --fn:'Pretendard Variable','Pretendard','Noto Sans KR',-apple-system,sans-serif
}
body{font-family:var(--fn);background:var(--bg);color:var(--t1);min-height:100vh;font-size:14px;line-height:1.5}
input,textarea,select,button{font-family:var(--fn)}
button{cursor:pointer;border:none;background:none}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* === LAYOUT === */
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{height:54px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;position:sticky;top:0;z-index:200;box-shadow:var(--sh)}
.logo{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:900;letter-spacing:-.5px;color:var(--t1)}
.logo-icon{width:30px;height:30px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:210px;background:var(--card);border-right:1px solid var(--border);padding:14px 10px;flex-shrink:0;height:calc(100vh - 54px);overflow-y:auto;position:sticky;top:54px}
.main{flex:1;padding:24px 28px;overflow-y:auto;height:calc(100vh - 54px)}

/* === NAV === */
.nav-section{margin-bottom:18px}
.nav-label{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;padding:0 8px;margin-bottom:5px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;transition:all .1s;margin-bottom:1px}
.nav-item:hover{background:var(--card2);color:var(--t1)}
.nav-item.active{background:var(--blue2);color:var(--blue);font-weight:700}
.nav-item .ni-icon{width:16px;height:16px;flex-shrink:0;opacity:.7}
.nav-item.active .ni-icon{opacity:1}
.nav-badge{margin-left:auto;padding:1px 6px;border-radius:999px;font-size:10px;font-weight:700;background:var(--red);color:#fff}

/* === BUTTONS === */
.btn{display:inline-flex;align-items:center;gap:6px;padding:0 14px;height:36px;border-radius:var(--r);font-size:13px;font-weight:600;transition:all .12s;cursor:pointer;border:none;flex-shrink:0;white-space:nowrap}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#2570e5}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--card2);color:var(--t1)}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#d44}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#12b057}
.btn-outline-blue{background:transparent;color:var(--blue);border:1px solid rgba(49,130,246,.4)}.btn-outline-blue:hover{background:var(--blue2)}
.btn-sm{height:28px;padding:0 10px;font-size:12px;border-radius:6px}
.btn-lg{height:44px;padding:0 22px;font-size:14px;font-weight:700}
.btn:disabled{opacity:.45;cursor:not-allowed}

/* === FORM === */
.fg{margin-bottom:14px}
.fl{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:5px;display:block}
.fi{width:100%;height:40px;padding:0 11px;border:1.5px solid var(--border);border-radius:var(--r);font-size:13px;color:var(--t1);background:var(--card2);outline:none;transition:border .15s}
.fi:focus{border-color:var(--blue);background:var(--card)}
.fta{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:var(--r);font-size:13px;color:var(--t1);background:var(--card2);outline:none;resize:vertical;line-height:1.6;transition:border .15s;min-height:76px}
.fta:focus{border-color:var(--blue);background:var(--card)}
.fs{width:100%;height:40px;padding:0 11px;border:1.5px solid var(--border);border-radius:var(--r);font-size:13px;color:var(--t1);background:var(--card2);outline:none;cursor:pointer;appearance:none}
.fs:focus{border-color:var(--blue)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fhint{font-size:11.5px;color:var(--t3);margin-top:4px;line-height:1.5}

/* === CARD === */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);box-shadow:var(--sh)}
.ch{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.ct{font-size:15px;font-weight:700;color:var(--t1)}
.cb{padding:18px}

/* === BADGE === */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:999px;font-size:11.5px;font-weight:600;flex-shrink:0}
.b-blue{background:var(--blue2);color:var(--blue);border:1px solid rgba(49,130,246,.2)}
.b-green{background:var(--green2);color:#0ea05a;border:1px solid rgba(23,201,100,.2)}
.b-red{background:var(--red2);color:var(--red);border:1px solid rgba(232,92,92,.2)}
.b-orange{background:var(--orange2);color:#d97706;border:1px solid rgba(245,158,11,.2)}
.b-gray{background:var(--card2);color:var(--t2);border:1px solid var(--border)}
.b-purple{background:var(--purple2);color:var(--purple);border:1px solid rgba(124,58,237,.2)}
.b-teal{background:var(--teal2);color:var(--teal);border:1px solid rgba(8,145,178,.2)}

/* === TABLE === */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;padding:9px 13px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;background:var(--card2)}
td{font-size:13px;color:var(--t1);padding:11px 13px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(49,130,246,.02)}

/* === STATS === */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:15px 18px;box-shadow:var(--sh)}
.stat-l{font-size:11.5px;font-weight:600;color:var(--t3);margin-bottom:5px}
.stat-v{font-size:26px;font-weight:900;color:var(--t1);letter-spacing:-1px;line-height:1}
.stat-s{font-size:11.5px;color:var(--t2);margin-top:3px}

/* === MODAL === */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border-radius:var(--r3);box-shadow:0 20px 60px rgba(0,0,0,.18);width:100%;max-height:92vh;overflow-y:auto;position:relative;animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
.ms{max-width:380px}.mm{max-width:540px}.ml{max-width:700px}.mxl{max-width:900px}
.mcl{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--card2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--t3);z-index:10}
.mcl:hover{background:var(--red2);color:var(--red)}
.mh{padding:22px 22px 14px}.mt{font-size:18px;font-weight:800;color:var(--t1);letter-spacing:-.3px}
.mst{font-size:13px;color:var(--t3);margin-top:3px}
.mb{padding:0 22px 22px}
.mf{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* === CALENDAR === */
.cal{border:1.5px solid var(--border);border-radius:var(--r2);overflow:hidden;background:var(--card)}
.cal-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--card2);border-bottom:1px solid var(--border)}
.cal-nav{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);transition:all .12s}
.cal-nav:hover{background:var(--blue2);border-color:var(--blue);color:var(--blue)}
.cal-mo{font-size:14px;font-weight:700;color:var(--t1)}
.cal-body{padding:10px}
.cal-wk{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px}
.cal-wh{text-align:center;font-size:10.5px;font-weight:600;color:var(--t3);padding:3px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:12.5px;border-radius:7px;cursor:pointer;transition:all .12s;border:1.5px solid transparent;position:relative;font-weight:400}
.cal-d.empty,.cal-d.disabled{pointer-events:none}
.cal-d.disabled{opacity:.3}
.cal-d.in-period{background:rgba(49,130,246,.04)}
.cal-d.sel:hover,.cal-d.hi:hover,.cal-d.in-period:hover{background:var(--blue2);border-color:rgba(49,130,246,.3)}
.cal-d.sel{background:var(--blue)!important;color:#fff!important;font-weight:700;border-color:var(--blue)}
.cal-d.hi:not(.sel){border-color:rgba(49,130,246,.25)}
.cal-d.sun{color:#ef4444}.cal-d.sat{color:var(--blue)}.cal-d.sel.sun,.cal-d.sel.sat{color:#fff!important}

/* === LOGIN === */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#EEF4FF 0%,#F7F8FA 55%,#F0FFF4 100%)}
.login-card{width:440px;background:var(--card);border:1px solid var(--border);border-radius:22px;box-shadow:var(--sh2);padding:38px 36px}
.role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.role-btn{padding:14px 6px;border-radius:var(--r2);border:2px solid var(--border);background:var(--card2);cursor:pointer;text-align:center;transition:all .15s}
.role-btn:hover{border-color:var(--blue);background:var(--blue2)}
.role-btn.sel{border-color:var(--blue);background:var(--blue2)}
.role-icon{font-size:22px;margin-bottom:4px}
.role-name{font-size:12.5px;font-weight:700;color:var(--t1)}
.role-desc{font-size:10.5px;color:var(--t3);margin-top:2px}
.acct-hint{background:var(--card2);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;font-size:12px;color:var(--t2);line-height:1.8;margin-bottom:14px}

/* === PROGRAM SELECT DIALOG === */
.prog-sel-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1.5px solid var(--border);border-radius:var(--r2);cursor:pointer;transition:all .15s;margin-bottom:8px}
.prog-sel-item:hover{border-color:var(--blue);background:var(--blue2)}
.prog-sel-item.selected{border-color:var(--blue);background:var(--blue2)}
.prog-sel-icon{width:42px;height:42px;border-radius:var(--r);background:linear-gradient(135deg,var(--blue),#6366f1);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.prog-sel-name{font-size:14px;font-weight:700;color:var(--t1)}
.prog-sel-meta{font-size:12px;color:var(--t3);margin-top:2px}

/* === PROG CARD === */
.prog-hero{background:linear-gradient(135deg,#2563EB,#7C3AED);border-radius:var(--r2);padding:20px 24px;color:#fff;margin-bottom:22px}
.prog-hero-name{font-size:20px;font-weight:900;letter-spacing:-.4px}
.prog-hero-period{font-size:12.5px;opacity:.85;margin-top:4px}
.prog-hero-badges{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.prog-hero-badge{padding:3px 10px;background:rgba(255,255,255,.2);border-radius:999px;font-size:12px;font-weight:600}

/* === TOGGLE === */
.tgl-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:var(--r);background:var(--card2);border:1px solid var(--border);cursor:pointer;margin-bottom:8px}
.tgl{width:34px;height:20px;border-radius:10px;background:var(--t4);position:relative;transition:background .2s;flex-shrink:0}
.tgl.on{background:var(--blue)}
.tgl::after{content:'';position:absolute;width:13px;height:13px;border-radius:50%;background:#fff;top:3.5px;left:3.5px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tgl.on::after{left:17.5px}

/* === SEG === */
.seg{display:flex;border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--card2)}
.seg-btn{flex:1;height:36px;font-size:13px;font-weight:500;color:var(--t2);background:transparent;border:none;cursor:pointer;transition:all .12s}
.seg-btn.on{background:var(--blue);color:#fff;font-weight:700}

/* === DATE CHIP === */
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:999px;background:var(--blue2);border:1px solid rgba(49,130,246,.2);font-size:12px;font-weight:600;color:var(--blue)}
.chip-x{cursor:pointer;font-size:13px;line-height:1;opacity:.6;margin-left:2px}.chip-x:hover{opacity:1}

/* === STATUS DOT === */
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-green{background:var(--green)}.dot-orange{background:var(--orange)}.dot-red{background:var(--red)}.dot-gray{background:var(--t3)}.dot-blue{background:var(--blue)}

/* === STEP === */
.steps{display:flex;align-items:center;gap:0;margin-bottom:22px}
.step{display:flex;align-items:center;gap:7px}
.step-n{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.step.done .step-n{background:var(--green);color:#fff}
.step.active .step-n{background:var(--blue);color:#fff}
.step.pending .step-n{background:var(--card2);color:var(--t3);border:1.5px solid var(--border)}
.step-lbl{font-size:12px;font-weight:600;white-space:nowrap}
.step.done .step-lbl{color:var(--t2)}.step.active .step-lbl{color:var(--blue)}.step.pending .step-lbl{color:var(--t3)}
.step-line{flex:1;height:1.5px;background:var(--border);margin:0 4px;min-width:16px}

/* === MATCH === */
.match-run{background:var(--card2);border-radius:var(--r2);padding:32px;text-align:center}
.match-spin{width:52px;height:52px;border-radius:50%;border:3px solid var(--blue2);border-top-color:var(--blue);animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* === INTERVIEW ROOM === */
.iv-room{display:grid;grid-template-columns:1fr 340px;gap:16px;height:calc(100vh - 140px)}
.iv-video{background:#111;border-radius:var(--r2);position:relative;overflow:hidden;display:flex;flex-direction:column}
.iv-screen{flex:1;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);position:relative}
.iv-controls{height:60px;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;gap:12px;flex-shrink:0}
.iv-ctrl-btn{width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .15s}
.iv-side{display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.iv-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.iv-panel-h{padding:10px 14px;background:var(--card2);border-bottom:1px solid var(--border);font-size:12.5px;font-weight:700;color:var(--t1)}
.iv-panel-b{padding:14px}

/* === APPLICANT CARD === */
.acard{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:15px;cursor:pointer;transition:all .15s}
.acard:hover{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue2)}
.avatar{border-radius:50%;background:linear-gradient(135deg,#3182F6,#7C3AED);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;flex-shrink:0}

/* === INFO ROW === */
.ir{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.ir:last-child{border-bottom:none}
.ik{font-size:12px;font-weight:600;color:var(--t3);min-width:100px;flex-shrink:0;padding-top:1px}
.iv2{font-size:13px;color:var(--t1);flex:1;line-height:1.5}
.isect{background:var(--card2);border-radius:var(--r);padding:12px 13px;margin-bottom:10px}

/* === FILTER TABS === */
.filter-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.ftab{padding:5px 12px;border-radius:999px;border:1.5px solid var(--border);font-size:12.5px;font-weight:600;color:var(--t2);cursor:pointer;background:var(--card2);transition:all .12s}
.ftab:hover{border-color:var(--blue);color:var(--blue)}
.ftab.on{border-color:var(--blue);background:var(--blue);color:#fff}

/* === STATUS SELECT === */
.status-sel{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700;border:none;cursor:pointer;outline:none}
.st-pass{background:#dcfce7;color:#16a34a}.st-pre{background:#fef3c7;color:#d97706}
.st-fail{background:var(--red2);color:var(--red)}.st-wait{background:var(--card2);color:var(--t2)}

/* === MISC === */
.ph{margin-bottom:22px}.ph-t{font-size:21px;font-weight:900;color:var(--t1);letter-spacing:-.5px}.ph-s{font-size:13px;color:var(--t3);margin-top:3px}
.empty{text-align:center;padding:44px 20px;color:var(--t3)}
.empty-ico{font-size:34px;margin-bottom:8px}.empty-t{font-size:14px;font-weight:600;color:var(--t2)}.empty-s{font-size:12px;margin-top:4px}
.divider{height:1px;background:var(--border);margin:14px 0}
.flex{display:flex}.aic{align-items:center}.jb{justify-content:space-between}.gap2{gap:8px}.gap3{gap:12px}.gap4{gap:16px}
.mt2{margin-top:8px}.mt3{margin-top:12px}.mt4{margin-top:16px}.mb2{margin-bottom:8px}.mb3{margin-bottom:12px}.mb4{margin-bottom:16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.w-full{width:100%}
.toast-wrap{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:6px;align-items:center}
.toast{background:var(--t1);color:#fff;padding:9px 18px;border-radius:var(--r2);font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.2);display:flex;align-items:center;gap:8px;animation:toastIn .25s ease;white-space:nowrap}
.toast.err{background:var(--red)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
const WEEKDAYS=['일','월','화','수','목','금','토']
const MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월']

const ACCOUNTS={
  'admin@intern.kr':   {role:'admin',  id:'admin', pw:'1234'},
  'kakao@intern.kr':   {role:'company',id:'c1',    pw:'1234'},
  'naver@intern.kr':   {role:'company',id:'c2',    pw:'1234'},
  'krafton@intern.kr': {role:'company',id:'c3',    pw:'1234'},
  'minjun@intern.kr':  {role:'student',id:'s1',    pw:'1234'},
  'seoyeon@intern.kr': {role:'student',id:'s2',    pw:'1234'},
  'jiho@intern.kr':    {role:'student',id:'s3',    pw:'1234'},
  'yuna@intern.kr':    {role:'student',id:'s4',    pw:'1234'},
  'dohyun@intern.kr':  {role:'student',id:'s5',    pw:'1234'},

const fmtDate=d=>{if(!d)return'';const dt=new Date(d+'T00:00:00');return`${dt.getMonth()+1}월 ${dt.getDate()}일(${WEEKDAYS[dt.getDay()]})`}
const fmtShort=d=>{if(!d)return'';const dt=new Date(d+'T00:00:00');return`${dt.getMonth()+1}/${dt.getDate()}`}
const modeLbl=m=>m==='online'?'비대면(화상)':'대면'

const getSt=id=>DB.students.find(s=>s.id===id)
const getProg=()=>S.prog||PROGRAMS[0]
const t2m=t=>{const[h,m]=t.split(':').map(Number);return h*60+m}
const m2t=m=>`${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`

function genSlots(start,end,step){
  const r=[];let c=t2m(start)
  while(c+step<=t2m(end)){r.push(m2t(c));c+=step}
  return r
}

function showToast(msg,type='ok'){

  S.toasts.push({id,msg,type})
  render()
  setTimeout(()=>{S.toasts=S.toasts.filter(t=>t.id!==id);render()},2800)
}

// CALENDAR
// ═══════════════════════════════════════════
function renderCal({id,sel=[],hi=[],readonly=false}){
  const cs=calState(id)
  const {y,m}=cs
  const p=getProg()
  const pS=p.interviewStart,pE=p.interviewEnd
  const first=new Date(y,m,1).getDay()
  const dim=new Date(y,m+1,0).getDate()
  const prevY=m===0?y-1:y,prevM=m===0?11:m-1
  const nextY=m===11?y+1:y,nextM=m===11?0:m+1
  const cells=[...Array(first).fill(null),...Array.from({length:dim},(_,i)=>i+1)]
  while(cells.length%7)cells.push(null)
  return`<div class="cal">
    <div class="cal-hd">
      <button class="cal-nav" onclick="calNav('${id}',${prevY},${prevM})">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M10 4l-4 4 4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="cal-mo">${y}년 ${MONTHS[m]}</div>
      <button class="cal-nav" onclick="calNav('${id}',${nextY},${nextM})">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <div class="cal-body">
      <div class="cal-wk">${WEEKDAYS.map((w,i)=>`<div class="cal-wh" style="color:${i===0?'#ef4444':i===6?'var(--blue)':'var(--t3)'}">${w}</div>`).join('')}</div>
      <div class="cal-grid">${cells.map((d,i)=>{
        if(!d)return`<div class="cal-d empty"></div>`
        const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
        const inP=ds>=pS&&ds<=pE
        const isSel=sel.includes(ds),isHi=hi.includes(ds)
        const dow=i%7
        let cls='cal-d'
        if(!inP)cls+=' disabled'
        else cls+=' in-period'
        if(isSel)cls+=' sel'
        else if(isHi)cls+=' hi'
        if(dow===0)cls+=' sun';if(dow===6)cls+=' sat'
        const onclick=readonly?'':inP?`onclick="calToggle('${id}','${ds}')"`:`onclick=""`
        return`<div class="${cls}" ${onclick} title="${fmtDate(ds)}">${d}${isHi&&!isSel?`<div style="position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:var(--blue);opacity:.7"></div>`:''}</div>`
      }).join('')}</div>
    </div>
  </div>`
}

function calToggle(id,ds){
  if(id==='co-cal'){
    const co=getCo(S.user.companyId)
    const dates=Object.keys(co.dateSlots)
    const idx=dates.indexOf(ds)
    if(idx===-1){co.dateSlots[ds]=[{start:'10:00',end:'17:00'}]}
    else{delete co.dateSlots[ds]}
  } else if(id.startsWith('st-cal-')){
    const coId=id.replace('st-cal-','')
    const st=getSt(S.user.studentId)
    if(!st.avail[coId])st.avail[coId]=[]
    const i=st.avail[coId].indexOf(ds)
    if(i===-1)st.avail[coId].push(ds)
    else st.avail[coId].splice(i,1)
  }
  render()
}

// ─── 매칭 진행 및 결과 ─────────────────────────
function renderMatching(){
  const p=getProg()
  const coReady=DB.companies.filter(c=>c.submitted).length
  const stReady=DB.students.filter(s=>Object.values(s.avail).some(a=>a.length>0)).length
  const canMatch=coReady>0&&stReady>0
  const failProcess=`
  <div class="card" style="border:1.5px solid var(--orange);margin-top:16px">
    <div class="ch" style="background:var(--orange2)"><div class="ct" style="color:#d97706">⚠ 매칭 실패 발생 시 프로세스</div></div>
    <div class="cb">
      <div class="steps">
        ${[['매칭 실패 감지','겹치는 날짜 없음'],['운영진 알림','실패 목록 확인'],['수동 조정','날짜/시간 직접 배정'],['재확정','안내 발송']].map((l,i)=>`
        <div class="step active">
          <div class="step-n" style="background:var(--orange);color:#fff">${i+1}</div>
          <div><div class="step-lbl" style="color:var(--t1)">${l[0]}</div><div style="font-size:10.5px;color:var(--t3)">${l[1]}</div></div>
        </div>${i<3?`<div class="step-line"></div>`:''}`).join('')}
      </div>
      <div style="font-size:12.5px;color:var(--t2);line-height:1.7;background:var(--card2);padding:12px;border-radius:var(--r);border:1px solid var(--border)">
        <strong>자동 매칭 알고리즘:</strong> 교집합 날짜가 적은 학생을 우선 배정 (Greedy). 교집합이 없는 학생은 자동으로 실패 목록에 분류되며, 운영진이 수동 배정 모달을 통해 직접 날짜·시간을 지정할 수 있습니다. 수동 배정 후 전체 확정 시 기업·학생 양측에 확정 메일이 발송됩니다.
      </div>
    </div>
  </div>`

  if(S.matchStatus==='running'){
    return`<div class="ph"><div class="ph-t">매칭 진행 및 결과</div></div>
    <div class="match-run"><div class="match-spin"></div>
      <div style="font-size:15px;font-weight:700;margin-bottom:4px">자동 매칭 진행 중...</div>
      <div style="font-size:12.5px;color:var(--t3)">날짜 교집합 계산 및 10분 슬롯 자동 배정 중</div>
    </div>${failProcess}`
  }

  return`<div>
  <div class="ph flex jb aic">
    <div><div class="ph-t">매칭 진행 및 결과</div><div class="ph-s">가능 날짜 교집합 기반 자동 슬롯 배정</div></div>
    ${S.matchStatus==='done'?`<div class="flex gap2">
      <button class="btn btn-ghost btn-sm" onclick="S.matchResults=null;S.matchStatus='idle';render()">초기화</button>

    </div>`:`<button class="btn btn-blue btn-lg ${!canMatch?'disabled':''}" ${!canMatch?'disabled':''} onclick="startMatch()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M5 3l14 9-14 9V3z" fill="white"/></svg>자동 매칭 실행
    </button>`}
  </div>
  <div class="g2 mb4">
    <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:14px 18px">
      <div style="font-size:12px;font-weight:600;color:var(--t3);margin-bottom:6px">기업 제출 현황</div>

function startMatch(){
  S.matchStatus='running';render()
  setTimeout(()=>{
    const results=[],failed=[]
    const p=getProg()
    DB.companies.forEach(co=>{
      const apps=DB.students.filter(s=>s.apps.includes(co.id))
      const used={}
      if(co.type==='1on1'){
        apps.map(s=>{
          const inter=Object.keys(co.dateSlots).filter(d=>(s.avail[co.id]||[]).includes(d))
          return{s,inter}
        }).sort((a,b)=>a.inter.length-b.inter.length)
        .forEach(({s,inter})=>{
          if(!inter.length){failed.push({co,s,reason:'겹치는 날짜 없음'});return}
          for(const d of inter){
            const slots=co.dateSlots[d].flatMap(ts=>genSlots(ts.start,ts.end,p.slotMinutes))
            const usedD=used[d]||[]
            const avail=slots.find(sl=>!usedD.includes(sl))
            if(avail){if(!used[d])used[d]=[];used[d].push(avail);results.push({co,students:[s],date:d,time:avail,type:'1:1',mode:co.mode});break}
          }
        })
      } else {
        const sz=co.groupSize||3
        const dmap={}
        apps.forEach(s=>{
          const inter=Object.keys(co.dateSlots).filter(d=>(s.avail[co.id]||[]).includes(d))
          if(!inter.length){failed.push({co,s,reason:'겹치는 날짜 없음'});return}
          for(const d of inter){if(!dmap[d])dmap[d]=[];dmap[d].push(s);break}
        })
        Object.entries(dmap).forEach(([d,studs])=>{
          const slots=co.dateSlots[d].flatMap(ts=>genSlots(ts.start,ts.end,p.slotMinutes))
          let si=0
          for(let i=0;i<studs.length;i+=sz){
            const grp=studs.slice(i,i+sz)
            if(si<slots.length){results.push({co,students:grp,date:d,time:slots[si],type:`그룹(${grp.length}명)`,mode:co.mode});si++}
          }
        })
      }
    })
    S.matchResults={results,failed}
    S.matchStatus='done'
    showToast('매칭이 완료되었습니다!')
    render()
  },2000)
}

  <div style="display:grid;grid-template-columns:320px 1fr;gap:20px;align-items:start">
    <div>
      ${renderCal({id:'co-cal',sel:dates})}
      <div style="margin-top:10px;font-size:12px;color:var(--t3);background:var(--card2);padding:10px;border-radius:var(--r);border:1px solid var(--border)">💡 파란 날짜: 면접 기간 내 날짜를 클릭하여 선택/해제</div>
    </div>
    <div>

          ${dates.length===0?`<div class="empty"><div class="empty-ico">📅</div><div class="empty-t">날짜를 선택해주세요</div></div>`:''}
          ${dates.map(d=>{
            const slots=co.dateSlots[d]||[]
            const totalSlots=slots.reduce((acc,s)=>acc+Math.floor((t2m(s.end)-t2m(s.start))/getProg().slotMinutes),0)
            return`<div style="margin-bottom:12px;padding:12px;border:1.5px solid var(--blue);border-radius:var(--r2);background:var(--blue2)">
              <div class="flex jb aic mb2">

                <div class="flex gap2">
                  <span style="font-size:11.5px;color:var(--t2)">총 ${totalSlots}슬롯</span>
                  <button onclick="calToggle('co-cal','${d}')" style="width:20px;height:20px;border-radius:50%;border:none;background:rgba(49,130,246,.15);cursor:pointer;color:var(--blue);font-size:13px;display:flex;align-items:center;justify-content:center" onmouseover="this.style.background='var(--red2)';this.style.color='var(--red)'" onmouseout="this.style.background='rgba(49,130,246,.15)';this.style.color='var(--blue)'">×</button>
                </div>
              </div>
              ${slots.map((s,si)=>`<div class="flex aic gap2 mb2">
                <input class="fi" type="time" value="${s.start}" oninput="coTimeEdit('${d}',${si},'start',this.value)" style="width:110px;height:34px">
                <span style="color:var(--t3);font-weight:600">~</span>
                <input class="fi" type="time" value="${s.end}" oninput="coTimeEdit('${d}',${si},'end',this.value)" style="width:110px;height:34px">
                <span style="font-size:11.5px;color:var(--t2)">${Math.floor((t2m(s.end)-t2m(s.start))/getProg().slotMinutes)}슬롯</span>
                ${slots.length>1?`<button onclick="coRemoveSlot('${d}',${si})" style="padding:3px 7px;border-radius:4px;border:1px solid rgba(232,92,92,.3);background:var(--red2);color:var(--red);font-size:11px;cursor:pointer">삭제</button>`:''}
              </div>`).join('')}

    </div>
  </div></div>`
}

        <a href="${r.co.link}" target="_blank" style="color:var(--blue);font-size:13.5px;font-weight:700">🔗 ${r.co.link}</a>
      </div>`:`<div style="margin-top:12px;padding:12px;background:var(--card2);border-radius:var(--r);border:1px solid var(--border)">
        <div style="font-size:11.5px;font-weight:600;color:var(--t3);margin-bottom:3px">면접 방식</div>
        <div style="font-size:13.5px;font-weight:700">🏢 대면 면접 — 장소 별도 안내 예정</div>
      </div>`}
    </div>
  </div>`).join('')}
  ${fails.map(f=>`<div class="card mb3" style="border-left:4px solid var(--red)">
    <div class="cb">
      <div class="flex aic gap2"><span class="badge b-red">매칭 실패</span><span style="font-weight:700">${f.co.name}</span></div>
      <div style="font-size:12.5px;color:var(--t2);margin-top:6px">사유: ${f.reason}. 운영진이 수동으로 배정할 예정입니다.</div>
    </div>
  </div>`).join('')}
  ${my.length===0&&fails.length===0?`<div class="empty"><div class="empty-ico">📋</div><div class="empty-t">배정된 면접이 없습니다</div></div>`:''}
  </div>`
}

function renderModal(){
  const m=S.modal
  if(!m)return''
  let c=''
  if(m.type==='prog-select')c=renderProgSelect()
  else if(m.type==='st-detail')c=renderStDetailModal(m.id)
  else if(m.type==='edit-prog')c=renderEditProgModal()
  else if(m.type==='co-detail')c=renderCoDetailModal(m.id)
  else if(m.type==='add-co')c=renderAddCoModal()
  else if(m.type==='add-st')c=renderAddStModal()
  else if(m.type==='manual-match')c=renderManualMatchModal(m.coId,m.stId)
  return`<div class="ov" onclick="closeModal(event)">${c}</div>`
}

function closeModal(e){if(e.target.classList.contains('ov')||e.target.classList.contains('mcl')){S.modal=null;render()}}
function openStDetail(id){S.modal={type:'st-detail',id};render()}

function epSetSlot(n){S.editProg.slotMinutes=n;render()}
function saveProg(){
  const prog=getProg()

  prog.companyDeadline=document.getElementById('ep-codeadline').value
  prog.studentDeadline=document.getElementById('ep-stdeadline').value

  S.modal=null;showToast('프로그램 설정이 저장되었습니다!')
}

    <div class="mb">
      <div class="isect">

        <div class="ir"><div class="ik">면접 형태</div><div class="iv2"><span class="badge ${typeClr(co.type)}">${typeLbl(co.type)}${co.type==='group'?` (${co.groupSize}명)`:''}</span></div></div>

function addCo(){
  const name=document.getElementById('nc-name').value.trim()
  const email=document.getElementById('nc-email').value.trim()
  if(!name||!email){showToast('기업명과 이메일을 입력하세요','err');return}
  const id='c'+Date.now()
  DB.companies.push({id,name,industry:document.getElementById('nc-ind').value,email,mode:document.getElementById('nc-mode').value,type:document.getElementById('nc-type').value,groupSize:3,link:'',dateSlots:{},submitted:false})
  ACCOUNTS[email]={role:'company',id,pw:'1234'}
  S.modal=null;showToast(`${name} 기업이 추가되었습니다!`)
}

function renderAddStModal(){
  return`<div class="modal mm" onclick="event.stopPropagation()">
    <button class="mcl" onclick="S.modal=null;render()">×</button>
    <div class="mh"><div class="mt">학생 추가</div></div>

      <div class="frow">

        <div class="fg"><label class="fl">학교</label><input class="fi" id="ns-school" placeholder="연세대학교"></div>
        <div class="fg"><label class="fl">학과</label><input class="fi" id="ns-dept" placeholder="컴퓨터공학과"></div>
      </div>
      <div class="fg"><label class="fl">지원 기업 선택 (최대 3개)</label>
        ${DB.companies.map(c=>`<label style="display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:13px;cursor:pointer">
          <input type="checkbox" class="ns-co-cb" value="${c.id}"> ${c.name}
        </label>`).join('')}
        <div class="fhint">최대 3개까지 선택 가능합니다</div>
      </div>
    </div>
    <div class="mf">
      <button class="btn btn-ghost" onclick="S.modal=null;render()">취소</button>
      <button class="btn btn-blue" onclick="addSt()">추가</button>
    </div>
  </div>`
}

function addSt(){
  const name=document.getElementById('ns-name').value.trim()
  const email=document.getElementById('ns-email').value.trim()
  if(!name||!email){showToast('이름과 이메일을 입력하세요','err');return}
  const sel=[...document.querySelectorAll('.ns-co-cb:checked')].map(c=>c.value)
  if(sel.length>3){showToast('기업은 최대 3개까지 선택 가능합니다','err');return}
  const id='s'+Date.now()
  DB.students.push({id,name,birth:document.getElementById('ns-birth').value,phone:'',email,addr:'',edLevel:'대학교 재학',school:document.getElementById('ns-school').value,faculty:'',dept:document.getElementById('ns-dept').value,appDate:new Date().toISOString().split('T')[0],motivation:'',vision:'',experience:'',portfolio:'',resume:'',apps:sel,avail:{},interviewStatus:{}})
  ACCOUNTS[email]={role:'student',id,pw:'1234'}
  S.modal=null;showToast(`${name} 학생이 추가되었습니다!`)
}

function renderManualMatchModal(coId,stId){
  const co=getCo(coId),st=getSt(stId)
  const p=getProg()
  const allSlots=Object.entries(co.dateSlots).flatMap(([d,tss])=>tss.flatMap(ts=>genSlots(ts.start,ts.end,p.slotMinutes).map(t=>({d,t}))))
  return`<div class="modal mm" onclick="event.stopPropagation()">
    <button class="mcl" onclick="S.modal=null;render()">×</button>
    <div class="mh"><div class="mt">수동 배정</div><div class="mst">${co.name} ← ${st.name}</div></div>
    <div class="mb">
      <div style="background:var(--red2);border:1px solid rgba(232,92,92,.2);border-radius:var(--r);padding:11px;font-size:12.5px;color:var(--red);margin-bottom:14px">⚠ 자동 매칭 실패. 날짜와 시간을 직접 지정해주세요.</div>
      <div class="frow">
        <div class="fg"><label class="fl">면접 날짜</label><input class="fi" type="date" id="mm-date" min="${p.interviewStart}" max="${p.interviewEnd}" value="${p.interviewStart}"></div>
        <div class="fg"><label class="fl">면접 시간</label>
          <select class="fs" id="mm-time">
            ${allSlots.slice(0,30).map(({d,t})=>`<option value="${d}__${t}">${fmtDate(d)} ${t}</option>`).join('')}
          </select>
        </div>
      </div>
    </div>
    <div class="mf">
      <button class="btn btn-ghost" onclick="S.modal=null;render()">취소</button>
      <button class="btn btn-blue" onclick="doManualMatch('${coId}','${stId}')">배정 확정</button>
    </div>
  </div>`
}

function doManualMatch(coId,stId){
  const co=getCo(coId),st=getSt(stId)
  const val=document.getElementById('mm-time').value
  const [date,time]=val.split('__')
  if(!S.matchResults)S.matchResults={results:[],failed:[]}
  S.matchResults.failed=S.matchResults.failed.filter(f=>!(f.co.id===coId&&f.s.id===stId))
  S.matchResults.results.push({co,students:[st],date,time,type:'1:1',mode:co.mode})
  S.modal=null;showToast(`${st.name} 수동 배정 완료!`)
}

function openManualMatch(coId,stId){S.modal={type:'manual-match',coId,stId};render()}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render(){
  const app=document.getElementById('app')
  if(S.view==='login')app.innerHTML=renderLogin()
  else if(S.view==='admin')app.innerHTML=renderAdmin()
  else if(S.view==='company')app.innerHTML=renderCompany()
  else if(S.view==='student')app.innerHTML=renderStudent()
  // restore input values
  const em=document.getElementById('login-email')
  const pw=document.getElementById('login-pw')
  if(em)em.value=S.loginEmail
  if(pw)pw.value=S.loginPw
}

render()
</script>
