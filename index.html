<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>면접 일정 자동 매칭 시스템 v2</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F8FA;--card:#fff;--card2:#F2F4F6;--card3:#EAECEF;
  --border:#E5E8EB;--border2:#D1D5DB;
  --blue:#3182F6;--blue2:rgba(49,130,246,.08);--blue3:rgba(49,130,246,.16);
  --t1:#191919;--t2:#6B7280;--t3:#B0B8C1;--t4:#E5E8EB;
  --green:#17C964;--green2:rgba(23,201,100,.1);
  --red:#E85C5C;--red2:rgba(232,92,92,.1);
  --orange:#F59E0B;--orange2:rgba(245,158,11,.1);
  --purple:#7C3AED;--purple2:rgba(124,58,237,.1);
  --teal:#0891B2;--teal2:rgba(8,145,178,.1);
  --sh:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --sh2:0 4px 16px rgba(0,0,0,.08),0 12px 40px rgba(0,0,0,.06);
  --r:8px;--r2:12px;--r3:16px;
  --fn:'Pretendard Variable','Pretendard','Noto Sans KR',-apple-system,sans-serif
}
body{font-family:var(--fn);background:var(--bg);color:var(--t1);min-height:100vh;font-size:14px;line-height:1.5}
input,textarea,select,button{font-family:var(--fn)}
button{cursor:pointer;border:none;background:none}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* === LAYOUT === */
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{height:54px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;position:sticky;top:0;z-index:200;box-shadow:var(--sh)}
.logo{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:900;letter-spacing:-.5px;color:var(--t1)}
.logo-icon{width:30px;height:30px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:210px;background:var(--card);border-right:1px solid var(--border);padding:14px 10px;flex-shrink:0;height:calc(100vh - 54px);overflow-y:auto;position:sticky;top:54px}
.main{flex:1;padding:24px 28px;overflow-y:auto;height:calc(100vh - 54px)}

/* === NAV === */
.nav-section{margin-bottom:18px}
.nav-label{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;padding:0 8px;margin-bottom:5px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;transition:all .1s;margin-bottom:1px}
.nav-item:hover{background:var(--card2);color:var(--t1)}
.nav-item.active{background:var(--blue2);color:var(--blue);font-weight:700}
.nav-item .ni-icon{width:16px;height:16px;flex-shrink:0;opacity:.7}
.nav-item.active .ni-icon{opacity:1}

/* === BUTTONS === */
.btn{display:inline-flex;align-items:center;gap:6px;padding:0 14px;height:36px;border-radius:var(--r);font-size:13px;font-weight:600;transition:all .12s;cursor:pointer;border:none;flex-shrink:0;white-space:nowrap}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#2570e5}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--card2);color:var(--t1)}
.btn-sm{height:28px;padding:0 10px;font-size:12px;border-radius:6px}
.btn-lg{height:44px;padding:0 22px;font-size:14px;font-weight:700}

/* === FORM === */
.fg{margin-bottom:18px}
.fl{font-size:12px;font-weight:700;color:var(--t1);margin-bottom:6px;display:block}
.fi{width:100%;height:40px;padding:0 12px;border:1.5px solid var(--border);border-radius:var(--r);font-size:13px;color:var(--t1);background:var(--card2);outline:none;transition:border .15s}
.fi:focus{border-color:var(--blue);background:var(--card)}
.fs{width:100%;height:40px;padding:0 12px;border:1.5px solid var(--border);border-radius:var(--r);font-size:13px;color:var(--t1);background:var(--card2);outline:none;cursor:pointer;appearance:none}
.fs:focus{border-color:var(--blue);background:var(--card)}

/* === CARD === */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);box-shadow:var(--sh)}
.ch{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.ct{font-size:15px;font-weight:700;color:var(--t1)}
.cb{padding:18px}

/* === BADGE === */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:999px;font-size:11.5px;font-weight:700;flex-shrink:0}
.b-blue{background:var(--blue2);color:var(--blue);border:1px solid rgba(49,130,246,.2)}
.b-green{background:var(--green2);color:#0ea05a;border:1px solid rgba(23,201,100,.2)}
.b-orange{background:var(--orange2);color:#d97706;border:1px solid rgba(245,158,11,.2)}
.b-red{background:var(--red2);color:var(--red);border:1px solid rgba(232,92,92,.2)}
.b-gray{background:var(--card2);color:var(--t2);border:1px solid var(--border)}
.b-purple{background:var(--purple2);color:var(--purple);border:1px solid rgba(124,58,237,.2)}

/* === TABLE === */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:11.5px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;padding:12px 14px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;background:var(--card2)}
td{font-size:13px;color:var(--t1);padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(49,130,246,.02)}
tr.clickable{cursor:pointer; transition:background .1s}

/* === LOGIN & PROG SELECT === */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#EEF4FF 0%,#F7F8FA 55%,#F0FFF4 100%)}
.login-card{width:440px;background:var(--card);border:1px solid var(--border);border-radius:22px;box-shadow:var(--sh2);padding:38px 36px}
.role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.role-btn{padding:14px 6px;border-radius:var(--r2);border:2px solid var(--border);background:var(--card2);cursor:pointer;text-align:center;transition:all .15s}
.role-btn:hover, .role-btn.sel{border-color:var(--blue);background:var(--blue2)}
.role-icon{font-size:22px;margin-bottom:4px}
.role-name{font-size:12.5px;font-weight:700;color:var(--t1)}
.role-desc{font-size:10.5px;color:var(--t3);margin-top:2px}
.acct-hint{background:var(--card2);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;font-size:12px;color:var(--t2);line-height:1.8;margin-bottom:14px}

.prog-sel-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1.5px solid var(--border);border-radius:var(--r2);cursor:pointer;transition:all .15s;margin-bottom:8px;background:var(--card)}
.prog-sel-item:hover{border-color:var(--blue);background:var(--blue2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(49,130,246,.08)}
.prog-sel-icon{width:42px;height:42px;border-radius:var(--r);background:linear-gradient(135deg,var(--blue),#6366f1);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;color:#fff}
.prog-sel-name{font-size:14px;font-weight:700;color:var(--t1)}
.prog-sel-meta{font-size:12px;color:var(--t3);margin-top:2px}

/* === SEG (TOGGLE TABS) === */
.seg{display:flex;border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--card2)}
.seg-btn{flex:1;height:36px;font-size:13px;font-weight:500;color:var(--t2);background:transparent;border:none;cursor:pointer;transition:all .12s}
.seg-btn.on{background:var(--blue);color:#fff;font-weight:700}

/* === TOGGLE SWITCH === */
.tgl-wrap{display:flex;align-items:center;gap:8px;cursor:pointer}
.tgl{width:36px;height:20px;border-radius:10px;background:var(--border2);position:relative;transition:background .2s;flex-shrink:0}
.tgl.on{background:var(--blue)}
.tgl::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tgl.on::after{left:19px}

/* === EDITOR === */
.editor-wrap{border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--card);transition:border .15s}
.editor-wrap:focus-within{border-color:var(--blue)}
.editor-toolbar{background:var(--card2);padding:8px 12px;border-bottom:1px solid var(--border);display:flex;gap:6px;align-items:center}
.e-btn{width:28px;height:28px;border-radius:4px;border:none;background:transparent;color:var(--t2);font-size:14px;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s}
.e-btn:hover{background:var(--border);color:var(--t1)}
.editor-content{min-height:300px;padding:16px;outline:none;font-size:14px;line-height:1.7;color:var(--t1)}
.editor-content:empty::before{content:attr(placeholder);color:var(--t3);pointer-events:none;display:block}

/* === MISC === */
.ph{margin-bottom:22px}.ph-t{font-size:21px;font-weight:900;color:var(--t1);letter-spacing:-.5px}.ph-s{font-size:13px;color:var(--t3);margin-top:3px}
.flex{display:flex}.aic{align-items:center}.jb{justify-content:space-between}.gap2{gap:8px}.gap3{gap:12px}
.w-full{width:100%}
.empty{text-align:center;padding:44px 20px;color:var(--t3)}
.divider{height:1px; background:var(--border); margin:20px 0;}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
const WEEKDAYS=['일','월','화','수','목','금','토']
const MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월']

const ACCOUNTS={
  'admin@intern.kr':   {role:'admin',  id:'admin', pw:'1234'},
  'kakao@intern.kr':   {role:'company',id:'c1',    pw:'1234'},
  'minjun@intern.kr':  {role:'student',id:'s1',    pw:'1234'},
}

const PROGRAMS=[
  {id:'p1',name:'2025 하반기 인턴형 프로그램',category:'인턴형',
   interviewStart:'2025-08-04',interviewEnd:'2025-08-15',status:'active'},
  {id:'p3',name:'2025 상반기 인턴형 프로그램',category:'인턴형',
   interviewStart:'2025-03-03',interviewEnd:'2025-03-14',status:'done'},
]

const DB={
  companies:[
    {id:'c1',name:'카카오엔터테인먼트',industry:'IT/콘텐츠',email:'kakao@intern.kr',mode:'online',type:'1on1',submitted:true},
    {id:'c2',name:'네이버웹툰',industry:'IT/플랫폼',email:'naver@intern.kr',mode:'offline',type:'group',submitted:true},
  ],
  notices:[
    {id: 2, title: '[필독] 2025 인턴형 면접 일정 관련 전체 안내', content: '<strong>면접 일정 가이드라인입니다.</strong><br><br>참여하시는 모든 기업 및 지원자 분들은 본 안내문을 필독해주시기 바랍니다.<br><ul><li>면접 10분 전 화상 링크 접속</li><li>장비 사전 테스트 요망</li></ul>', author: '운영진', date: '2025-07-20', visibility: 'public', target: 'all', pinned: true, views: 142},
    {id: 1, title: '시스템 점검 안내 (7/25 새벽 2시~4시)', content: '안정적인 서비스 제공을 위해 DB 서버 점검이 있을 예정입니다.<br>해당 시간에는 서비스 이용이 일시 중단됩니다.', author: '시스템관리자', date: '2025-07-18', visibility: 'public', target: 'company', pinned: false, views: 35}
  ]
}

// ═══════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════
const S={
  view:'login', tab:'',
  user:null, prog:null,
  loginRole:'admin', loginEmail:'', loginPw:'', loginErr:'',
  progTypeFilter:'인턴형',
  // 공지사항 탭 서브 뷰 상태 (list, write, detail)
  noticeView: 'list', 
  selectedNoticeId: null,
  // 임시 작성중인 공지 데이터
  draftNotice: { target: 'all', title: '', content: '', pinned: false, visibility: 'public' }
}

const fmtDate=d=>{if(!d)return'';const dt=new Date(d+'T00:00:00');return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`}

// ═══════════════════════════════════════════
// LOGIN VIEW & PROG SELECT
// ═══════════════════════════════════════════
const HINTS={
  admin:[['운영진','admin@intern.kr','1234']],
  company:[['카카오','kakao@intern.kr','1234']],
  student:[['김민준','minjun@intern.kr','1234']],
}

function renderLogin(){
  return`<div class="login-wrap">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:26px">
      <div style="display:inline-flex;width:46px;height:46px;background:var(--blue);border-radius:14px;align-items:center;justify-content:center;margin-bottom:12px">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M8 7H5a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3" stroke="white" stroke-width="2" stroke-linecap="round"/><path d="M9 3h6a1 1 0 0 1 1 1v4H8V4a1 1 0 0 1 1-1z" stroke="white" stroke-width="2" stroke-linecap="round"/><path d="M12 12v3m0 0-1.5-1.5m1.5 1.5 1.5-1.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div style="font-size:22px;font-weight:900;letter-spacing:-.5px">면접 일정 매칭<span style="color:var(--blue)">.</span></div>
    </div>
    <div class="fg"><div class="fl">역할 선택</div>
      <div class="role-grid">
        ${[['admin','🛠️','운영진','프로그램 관리'],['company','🏢','기업','면접 설정'],['student','🎓','학생','날짜 선택']].map(([r,ico,n,d])=>`
        <div class="role-btn ${S.loginRole===r?'sel':''}" onclick="S.loginRole='${r}';S.loginErr='';render()">
          <div class="role-icon">${ico}</div><div class="role-name">${n}</div><div class="role-desc">${d}</div>
        </div>`).join('')}
      </div>
    </div>
    <div class="acct-hint"><strong style="color:var(--blue)">테스트 계정</strong><br>
      ${HINTS[S.loginRole].map(([n,e,p])=>`${n}: <strong>${e}</strong> / ${p}`).join('<br>')}
    </div>
    <div class="fg"><label class="fl">이메일</label>
      <input class="fi" type="email" value="${S.loginEmail}" placeholder="이메일 입력" oninput="S.loginEmail=this.value">
    </div>
    <div class="fg"><label class="fl">비밀번호</label>
      <input class="fi" type="password" value="${S.loginPw}" placeholder="비밀번호 입력" oninput="S.loginPw=this.value" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    ${S.loginErr?`<div style="background:var(--red2);border:1px solid rgba(232,92,92,.3);border-radius:var(--r);padding:9px 12px;font-size:12.5px;color:var(--red);margin-bottom:12px">${S.loginErr}</div>`:''}
    <button class="btn btn-blue btn-lg w-full" onclick="doLogin()">로그인</button>
  </div></div>`
}

function doLogin(){
  const acc=ACCOUNTS[S.loginEmail.trim()]
  if(!acc||acc.pw!==S.loginPw){S.loginErr='이메일 또는 비밀번호가 올바르지 않습니다.';render();return}
  if(acc.role!==S.loginRole){S.loginErr='선택한 역할과 계정 유형이 다릅니다.';render();return}
  
  S.user = {...acc}; S.loginErr = '';
  if(acc.role === 'admin') { S.view = 'prog-select'; S.progTypeFilter = '인턴형'; } 
  else { S.prog = PROGRAMS[0]; S.view = acc.role; S.tab = acc.role==='company'?'co-settings':'st-status'; }
  render()
}
function doLogout(){Object.assign(S,{view:'login',tab:'',user:null,prog:null,loginEmail:'',loginPw:'',loginErr:'',noticeView:'list',selectedNoticeId:null});render()}

function renderProgSelectView(){
  const statusLabel={active:'진행중',upcoming:'예정',done:'완료'}
  const statusColor={active:'b-green',upcoming:'b-blue',done:'b-gray'}
  const filteredProgs = PROGRAMS.filter(p => p.category === S.progTypeFilter)
  return `<div class="login-wrap" style="align-items:flex-start; padding-top:10vh">
    <div style="width:540px; max-width:90%">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
        <div><div style="font-size:22px; font-weight:900; letter-spacing:-.5px; color:var(--t1)">교육과정 선택</div></div>
        <button class="btn btn-ghost btn-sm" onclick="doLogout()">로그아웃</button>
      </div>
      <div class="seg mb4">
        <button class="seg-btn ${S.progTypeFilter==='인턴형'?'on':''}" onclick="S.progTypeFilter='인턴형';render()">🏢 인턴형</button>
        <button class="seg-btn ${S.progTypeFilter==='프로젝트형'?'on':''}" onclick="S.progTypeFilter='프로젝트형';render()">📋 프로젝트형</button>
      </div>
      <div style="display:flex; flex-direction:column; gap:10px">
        ${filteredProgs.map(p=>`
        <div class="prog-sel-item" onclick="S.prog=PROGRAMS.find(x=>x.id==='${p.id}');S.view='admin';S.tab='notice';S.noticeView='list';render()">
          <div class="prog-sel-icon">${p.category==='인턴형'?'🏢':'📋'}</div>
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px"><div class="prog-sel-name">${p.name}</div><span class="badge ${statusColor[p.status]}">${statusLabel[p.status]}</span></div>
            <div class="prog-sel-meta">기간: ${p.interviewStart} ~ ${p.interviewEnd}</div>
          </div>
        </div>`).join('')}
      </div>
    </div>
  </div>`
}

// ═══════════════════════════════════════════
// APP SHELL
// ═══════════════════════════════════════════
function renderShell(sidebar,main){
  return`<div class="app">
    <div class="topbar">
      <div class="logo">
        <div class="logo-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M8 6H5a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-3M9 3h6a1 1 0 0 1 1 1v3H8V4a1 1 0 0 1 1-1z" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg></div>면접 매칭
      </div>
      ${S.prog?`<div style="height:20px;width:1px;background:var(--border)"></div>
        <div style="font-size:12px;font-weight:700;color:var(--blue);background:var(--blue2);padding:3px 10px;border-radius:999px;cursor:pointer" 
             onclick="if(S.user.role==='admin'){S.view='prog-select';render()}">${S.prog.name} ▾</div>`:''}
      <div style="flex:1"></div>
      ${S.view==='admin'?`<span class="badge b-teal">🛠 운영진</span>`:''}
      <div style="width:1px;height:18px;background:var(--border);margin:0 4px"></div>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">로그아웃</button>
    </div>
    <div class="layout"><div class="sidebar">${sidebar}</div><div class="main">${main}</div></div>
  </div>`
}

// ═══════════════════════════════════════════
// ADMIN DASHBOARD
// ═══════════════════════════════════════════
const ADMIN_NAV=[
  {id:'notice',label:'공지',ico:'<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>'},
  {id:'companies',label:'참여기업',ico:'<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><polyline points="9 22 9 12 15 12 15 22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>'},
  {id:'schedule',label:'면접일정',ico:'<rect x="3" y="4" width="18" height="18" rx="2" ry="2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><line x1="16" y1="2" x2="16" y2="6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><line x1="8" y1="2" x2="8" y2="6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>'},
]

function renderAdmin(){
  const sidebar=`<div class="nav-section">
    <div class="nav-label">대시보드 메뉴</div>
    ${ADMIN_NAV.map(n=>`<div class="nav-item ${S.tab===n.id?'active':''}" onclick="setTab('${n.id}')"><svg class="ni-icon" viewBox="0 0 24 24" fill="none">${n.ico}</svg>${n.label}</div>`).join('')}
  </div>`
  
  let main=''
  if(S.tab==='notice') {
    if (S.noticeView === 'write') main = renderNoticeWrite();
    else if (S.noticeView === 'detail') main = renderNoticeDetail();
    else main = renderNoticeList();
  }
  else if(S.tab==='companies') main=renderCompanies()
  else if(S.tab==='schedule') main=renderSchedule()
  
  return renderShell(sidebar,main)
}

function setTab(t){
  S.tab=t; 
  if(t==='notice') S.noticeView='list'; 
  render();
}

// ─── 1. 공지사항 리스트 뷰 ───────────────────────────────
function openNoticeDetail(id) {
  S.selectedNoticeId = id;
  const notice = DB.notices.find(n => n.id === id);
  if (notice) notice.views += 1; // 클릭 시 조회수 1 증가
  S.noticeView = 'detail';
  render();
}

function renderNoticeList(){
  const targetLabel = { 'all': '전체', 'company': '기업', 'student': '면접자' };
  const targetBadge = { 'all': 'b-purple', 'company': 'b-blue', 'student': 'b-orange' };

  const sortedNotices = [...DB.notices].sort((a,b) => {
    if(a.pinned === b.pinned) return b.id - a.id;
    return a.pinned ? -1 : 1;
  });

  return `<div>
    <div class="ph flex jb aic">
      <div><div class="ph-t">공지사항</div><div class="ph-s">프로그램 참여 기업 및 학생들에게 전달할 안내사항</div></div>
      <button class="btn btn-blue" onclick="openNoticeWrite()">
         <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="margin-right:2px"><path d="M12 5v14M5 12h14" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg> 공지사항 작성
      </button>
    </div>
    <div class="card">
      <div class="tw">
        <table>
          <thead><tr>
            <th style="width:60px; text-align:center">번호</th>
            <th style="width:80px; text-align:center">노출여부</th>
            <th style="width:80px; text-align:center">대상</th>
            <th>제목</th>
            <th style="width:120px">작성자</th>
            <th style="width:100px">작성일</th>
            <th style="width:80px; text-align:right">조회수</th>
          </tr></thead>
          <tbody>
            ${sortedNotices.length === 0 ? `<tr><td colspan="7" class="empty"><div class="empty-t">등록된 공지사항이 없습니다.</div></td></tr>` : ''}
            ${sortedNotices.map(n => `
            <tr class="clickable" onclick="openNoticeDetail(${n.id})" style="${n.pinned ? 'background-color: var(--blue2);' : ''}">
              <td style="text-align:center; color:var(--t3); font-weight:600">${n.pinned ? '—' : n.id}</td>
              <td style="text-align:center"><span class="badge ${n.visibility==='public'?'b-green':'b-gray'}">${n.visibility==='public'?'공개':'비공개'}</span></td>
              <td style="text-align:center"><span class="badge ${targetBadge[n.target]}">${targetLabel[n.target]}</span></td>
              <td>
                <div class="flex aic gap2" style="font-weight:${n.pinned?'700':'500'}">
                  ${n.pinned ? '<span style="color:var(--blue); font-size:12px">📌 [상단고정]</span>' : ''}
                  ${n.title}
                </div>
              </td>
              <td>${n.author}</td>
              <td style="color:var(--t2)">${n.date}</td>
              <td style="text-align:right; color:var(--t2)">${n.views.toLocaleString()}</td>
            </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`
}

// ─── 1-1. 공지사항 상세 뷰 ─────────────────────────
function renderNoticeDetail() {
  const n = DB.notices.find(x => x.id === S.selectedNoticeId);
  if(!n) { S.noticeView = 'list'; return renderNoticeList(); }

  const targetLabel = { 'all': '전체', 'company': '기업', 'student': '면접자' };
  const targetBadge = { 'all': 'b-purple', 'company': 'b-blue', 'student': 'b-orange' };

  return `<div>
    <div class="ph flex jb aic">
      <div><div class="ph-t">공지사항 상세</div></div>
      <div class="flex gap2">
        <button class="btn btn-ghost" onclick="S.noticeView='list';render()">← 목록으로</button>
      </div>
    </div>
    
    <div class="card" style="max-width: 900px">
      <div class="cb" style="padding: 28px 32px">
        <div class="flex gap2 mb2">
          ${n.pinned ? '<span class="badge b-blue">📌 상단고정</span>' : ''}
          <span class="badge ${n.visibility==='public'?'b-green':'b-gray'}">${n.visibility==='public'?'공개':'비공개'}</span>
          <span class="badge ${targetBadge[n.target]}">${targetLabel[n.target]} 대상</span>
        </div>
        
        <div style="font-size:22px; font-weight:800; color:var(--t1); margin-top:8px">${n.title}</div>
        
        <div class="flex gap3 mt3" style="font-size:13px; color:var(--t2)">
          <div class="flex aic gap2">
            <div style="width:24px; height:24px; border-radius:50%; background:var(--card2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:bold">${n.author[0]}</div>
            <span>${n.author}</span>
          </div>
          <div style="width:4px; height:4px; border-radius:50%; background:var(--border2); margin-top:10px"></div>
          <span style="margin-top:2px">${n.date}</span>
          <div style="width:4px; height:4px; border-radius:50%; background:var(--border2); margin-top:10px"></div>
          <span style="margin-top:2px">조회수 ${n.views.toLocaleString()}</span>
        </div>
        
        <div class="divider"></div>
        
        <div style="font-size:15px; line-height:1.8; color:var(--t1); min-height: 300px; white-space: pre-wrap;">${n.content}</div>
        
      </div>
    </div>
  </div>`
}

// ─── 1-2. 공지사항 작성 뷰 (에디터) ─────────────────────────
function openNoticeWrite(){
  S.draftNotice = { target: 'all', title: '', content: '', pinned: false, visibility: 'public' };
  S.noticeView = 'write';
  render();
}

function toggleDraft(key) { S.draftNotice[key] = !S.draftNotice[key]; render(); }
function setDraft(key, val) { S.draftNotice[key] = val; render(); }

function saveNotice() {
  const title = document.getElementById('notice-title').value.trim();
  const content = document.getElementById('notice-content').innerHTML.trim();
  
  if(!title) { alert('제목을 입력해주세요.'); return; }
  
  const newId = DB.notices.length > 0 ? Math.max(...DB.notices.map(n=>n.id)) + 1 : 1;
  const newNotice = {
    id: newId,
    title: title,
    content: content,
    author: '운영진',
    date: fmtDate(new Date().toISOString().split('T')[0]),
    visibility: S.draftNotice.visibility,
    target: S.draftNotice.target,
    pinned: S.draftNotice.pinned,
    views: 0
  };
  
  DB.notices.push(newNotice);
  S.noticeView = 'list';
  render();
}

function renderNoticeWrite(){
  const d = S.draftNotice;
  return `<div>
    <div class="ph flex jb aic">
      <div><div class="ph-t">공지사항 작성</div><div class="ph-s">새로운 공지사항을 등록합니다.</div></div>
      <div class="flex gap2">
        <button class="btn btn-ghost" onclick="S.noticeView='list';render()">취소</button>
        <button class="btn btn-blue" onclick="saveNotice()">등록 완료</button>
      </div>
    </div>
    
    <div class="card" style="max-width: 900px">
      <div class="cb">
        
        <div class="flex gap3 mb4" style="flex-wrap:wrap">
          <div style="flex:1; min-width:200px">
            <label class="fl">노출 대상</label>
            <select class="fs" onchange="setDraft('target', this.value)">
              <option value="all" ${d.target==='all'?'selected':''}>전체 (기업 및 면접자)</option>
              <option value="company" ${d.target==='company'?'selected':''}>기업만</option>
              <option value="student" ${d.target==='student'?'selected':''}>면접자만</option>
            </select>
          </div>
          <div style="flex:1; min-width:200px">
            <label class="fl">노출 여부 (공개 설정)</label>
            <select class="fs" onchange="setDraft('visibility', this.value)">
              <option value="public" ${d.visibility==='public'?'selected':''}>공개 (즉시 노출)</option>
              <option value="hidden" ${d.visibility==='hidden'?'selected':''}>비공개 (임시 저장)</option>
            </select>
          </div>
          <div style="display:flex; align-items:flex-end; padding-bottom:8px">
            <div class="tgl-wrap" onclick="toggleDraft('pinned')">
              <div class="tgl ${d.pinned?'on':''}"></div>
              <span style="font-size:13px; font-weight:600; color:var(--t1)">📌 상단 고정하기</span>
            </div>
          </div>
        </div>

        <div class="fg">
          <label class="fl">공지 제목</label>
          <input class="fi" id="notice-title" placeholder="제목을 입력하세요" value="${d.title}" style="font-size:15px; font-weight:600">
        </div>

        <div class="fg">
          <label class="fl">공지 내용 (에디터)</label>
          <div class="editor-wrap">
            <div class="editor-toolbar">
              <button class="e-btn" onclick="document.execCommand('bold',false,null)" title="굵게"><b>B</b></button>
              <button class="e-btn" onclick="document.execCommand('italic',false,null)" title="기울임"><i>I</i></button>
              <button class="e-btn" onclick="document.execCommand('underline',false,null)" title="밑줄"><u>U</u></button>
              <div style="width:1px; height:16px; background:var(--border); margin:0 4px"></div>
              <button class="e-btn" onclick="document.execCommand('insertUnorderedList',false,null)" title="글머리 기호">•</button>
              <button class="e-btn" onclick="document.execCommand('insertOrderedList',false,null)" title="번호 매기기">1.</button>
              <div style="width:1px; height:16px; background:var(--border); margin:0 4px"></div>
              <button class="e-btn" onclick="let url=prompt('링크 URL을 입력하세요');if(url)document.execCommand('createLink',false,url)" title="링크 삽입">🔗</button>
            </div>
            <div class="editor-content" contenteditable="true" id="notice-content" placeholder="이곳에 공지사항 내용을 작성하세요...">${d.content}</div>
          </div>
        </div>

      </div>
    </div>
  </div>`
}

// ─── 참여기업 & 면접일정 뷰 (기존 유지) ─────────────────────────
function renderCompanies(){
  return `<div>
    <div class="ph flex jb aic">
      <div><div class="ph-t">참여기업 관리</div><div class="ph-s">${S.prog.name}에 참여 중인 기업 목록</div></div>
      <button class="btn btn-blue">기업 추가</button>
    </div>
    <div class="card">
      <div class="tw">
        <table>
          <thead><tr><th>기업명</th><th>산업군</th><th>면접 방식</th><th>면접 형태</th><th>일정 제출 상태</th></tr></thead>
          <tbody>
            ${DB.companies.map(co => `
            <tr>
              <td style="font-weight: 700">${co.name}</td>
              <td style="color: var(--t2)">${co.industry}</td>
              <td><span class="badge ${co.mode==='online'?'b-blue':'b-green'}">${co.mode==='online'?'비대면(화상)':'대면'}</span></td>
              <td><span class="badge ${co.type==='1on1'?'b-purple':'b-orange'}">${co.type==='1on1'?'1:1 면접':'그룹 면접'}</span></td>
              <td><span class="badge ${co.submitted?'b-green':'b-orange'}">${co.submitted?'제출완료':'미제출'}</span></td>
            </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`
}

function renderSchedule(){
  return `<div>
    <div class="ph flex jb aic">
      <div><div class="ph-t">면접일정 관리</div><div class="ph-s">전체 면접 일정 현황 및 매칭 결과</div></div>
      <div class="flex gap2">
         <button class="btn btn-ghost">일정표 다운로드</button>
         <button class="btn btn-blue">자동 매칭 실행</button>
      </div>
    </div>
    <div class="card"><div class="empty"><div class="empty-ico">📅</div><div class="empty-t">아직 확정된 면접 일정이 없습니다.</div></div></div>
  </div>`
}

// ═══════════════════════════════════════════
// INITIAL RENDER
// ═══════════════════════════════════════════
function render(){
  const app=document.getElementById('app')
  if(S.view==='login') app.innerHTML=renderLogin()
  else if(S.view==='prog-select') app.innerHTML=renderProgSelectView()
  else if(S.view==='admin') app.innerHTML=renderAdmin()
  
  if(S.view==='login'){
     const em=document.querySelector('input[type="email"]')
     const pw=document.querySelector('input[type="password"]')
     if(em)em.value=S.loginEmail
     if(pw)pw.value=S.loginPw
  }
}
render()
</script>
