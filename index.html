<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>면접 일정 자동 매칭 시스템</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F8FA;--card:#fff;--card2:#F2F4F6;--border:#E5E8EB;--border2:#D1D5DB;
  --blue:#3182F6;--blue2:rgba(49,130,246,0.08);--blue3:rgba(49,130,246,0.15);
  --t1:#191919;--t2:#6B7280;--t3:#B0B8C1;--t4:#E5E8EB;
  --green:#17C964;--green2:rgba(23,201,100,0.1);
  --red:#E85C5C;--red2:rgba(232,92,92,0.1);
  --orange:#F59E0B;--orange2:rgba(245,158,11,0.1);
  --purple:#7C3AED;--purple2:rgba(124,58,237,0.1);
  --shadow:0 1px 4px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.04);
  --shadow2:0 2px 8px rgba(0,0,0,0.08),0 8px 32px rgba(0,0,0,0.06);
  --r:8px;--r2:12px;--r3:16px;
  --font:'Pretendard Variable','Pretendard','Noto Sans KR',-apple-system,sans-serif
}
body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100vh;font-size:14px;line-height:1.5}
input,textarea,select,button{font-family:var(--font)}
button{cursor:pointer;border:none;background:none}
a{text-decoration:none}

/* ─── Layout ─── */
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{height:56px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.topbar-logo{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:800;letter-spacing:-0.4px;color:var(--t1)}
.topbar-logo .dot{color:var(--blue)}
.layout{display:flex;flex:1}
.sidebar{width:220px;background:var(--card);border-right:1px solid var(--border);padding:16px 12px;flex-shrink:0;min-height:calc(100vh - 56px);position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.main{flex:1;padding:28px 32px;min-width:0}

/* ─── Nav ─── */
.nav-group{margin-bottom:20px}
.nav-group-label{font-size:10.5px;font-weight:700;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;padding:0 8px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;transition:all .12s;border:1px solid transparent}
.nav-item:hover{background:var(--card2);color:var(--t1)}
.nav-item.active{background:var(--blue2);color:var(--blue);font-weight:700;border-color:rgba(49,130,246,.15)}
.nav-item svg{flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}

/* ─── Cards ─── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);box-shadow:var(--shadow);overflow:hidden}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:15px;font-weight:700;color:var(--t1)}
.card-body{padding:20px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}

/* ─── Buttons ─── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:0 14px;height:36px;border-radius:var(--r);font-size:13px;font-weight:600;transition:all .12s;cursor:pointer;border:none;flex-shrink:0}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#2570e5}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--card2);color:var(--t1)}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(232,92,92,.3)}
.btn-danger:hover{background:var(--red2)}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover{background:#12b057}
.btn-sm{height:28px;padding:0 10px;font-size:12px}
.btn-lg{height:44px;padding:0 20px;font-size:14px;font-weight:700}

/* ─── Form Elements ─── */
.form-group{margin-bottom:16px}
.form-label{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:5px;display:block}
.form-input{width:100%;height:40px;padding:0 12px;border:1.5px solid var(--border);border-radius:var(--r);font-size:13px;color:var(--t1);background:var(--card2);outline:none;transition:border .15s}
.form-input:focus{border-color:var(--blue);background:var(--card)}
.form-textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--r);font-size:13px;color:var(--t1);background:var(--card2);outline:none;resize:vertical;line-height:1.6;transition:border .15s;min-height:80px}
.form-textarea:focus{border-color:var(--blue);background:var(--card)}
.form-select{width:100%;height:40px;padding:0 12px;border:1.5px solid var(--border);border-radius:var(--r);font-size:13px;color:var(--t1);background:var(--card2);outline:none;transition:border .15s;appearance:none;cursor:pointer}
.form-select:focus{border-color:var(--blue)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-hint{font-size:11.5px;color:var(--t3);margin-top:4px;line-height:1.5}

/* ─── Toggle ─── */
.toggle-wrap{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:var(--r);background:var(--card2);border:1px solid var(--border);margin-bottom:10px;cursor:pointer}
.toggle-label{font-size:13px;font-weight:500;color:var(--t1)}
.toggle{width:36px;height:20px;border-radius:10px;background:var(--t4);position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--blue)}
.toggle::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{left:19px}

/* ─── Segment Control ─── */
.segment{display:flex;border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--card2)}
.segment-btn{flex:1;height:36px;font-size:13px;font-weight:500;color:var(--t2);background:transparent;border:none;cursor:pointer;transition:all .12s}
.segment-btn.active{background:var(--blue);color:#fff;font-weight:700}

/* ─── Badge / Tag ─── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:11.5px;font-weight:600;flex-shrink:0}
.badge-blue{background:var(--blue2);color:var(--blue);border:1px solid rgba(49,130,246,.2)}
.badge-green{background:var(--green2);color:#0ea05a;border:1px solid rgba(23,201,100,.2)}
.badge-red{background:var(--red2);color:var(--red);border:1px solid rgba(232,92,92,.2)}
.badge-orange{background:var(--orange2);color:#d97706;border:1px solid rgba(245,158,11,.2)}
.badge-gray{background:var(--card2);color:var(--t2);border:1px solid var(--border)}
.badge-purple{background:var(--purple2);color:var(--purple);border:1px solid rgba(124,58,237,.2)}

/* ─── Table ─── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:11.5px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;padding:10px 14px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
td{font-size:13px;color:var(--t1);padding:12px 14px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}

/* ─── Calendar ─── */
.cal-wrap{border:1.5px solid var(--border);border-radius:var(--r2);overflow:hidden;background:var(--card)}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);background:var(--card2)}
.cal-month{font-size:14px;font-weight:700;color:var(--t1)}
.cal-nav{width:28px;height:28px;border-radius:var(--r);border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);transition:all .12s}
.cal-nav:hover{background:var(--blue2);border-color:var(--blue);color:var(--blue)}
.cal-grid{padding:12px}
.cal-days-header{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.cal-day-header{text-align:center;font-size:11px;font-weight:600;color:var(--t3);padding:4px 0}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:12.5px;border-radius:var(--r);cursor:pointer;transition:all .12s;border:1.5px solid transparent;position:relative;font-weight:400;color:var(--t1)}
.cal-day.empty{pointer-events:none}
.cal-day.other-month{color:var(--t3)}
.cal-day.in-period{background:rgba(49,130,246,.05)}
.cal-day.selectable:hover{background:var(--blue2);border-color:var(--blue);color:var(--blue)}
.cal-day.selected{background:var(--blue);color:#fff;font-weight:700;border-color:var(--blue)}
.cal-day.selected:hover{background:#2570e5}
.cal-day.disabled{opacity:.3;pointer-events:none}
.cal-day.sunday{color:#ef4444}
.cal-day.saturday{color:var(--blue)}
.cal-day.selected.sunday,.cal-day.selected.saturday{color:#fff}

/* ─── Stats Row ─── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:16px 20px;box-shadow:var(--shadow)}
.stat-label{font-size:12px;font-weight:600;color:var(--t3);margin-bottom:6px}
.stat-value{font-size:26px;font-weight:800;color:var(--t1);letter-spacing:-1px;line-height:1}
.stat-sub{font-size:11.5px;color:var(--t2);margin-top:4px}

/* ─── Login ─── */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0f4ff 0%,#F7F8FA 60%)}
.login-card{width:420px;background:var(--card);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow2);padding:40px}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo-text{font-size:24px;font-weight:900;color:var(--t1);letter-spacing:-1px}
.login-logo-sub{font-size:13px;color:var(--t3);margin-top:4px}
.role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:24px}
.role-btn{padding:14px 8px;border-radius:var(--r2);border:2px solid var(--border);background:var(--card2);cursor:pointer;text-align:center;transition:all .15s}
.role-btn:hover{border-color:var(--blue);background:var(--blue2)}
.role-btn.selected{border-color:var(--blue);background:var(--blue2)}
.role-btn .role-icon{font-size:22px;margin-bottom:5px}
.role-btn .role-name{font-size:12.5px;font-weight:700;color:var(--t1)}
.role-btn .role-desc{font-size:11px;color:var(--t3);margin-top:2px}
.accounts-hint{background:var(--card2);border-radius:var(--r);padding:12px;margin-bottom:16px;font-size:12px;color:var(--t2);line-height:1.7}
.accounts-hint strong{color:var(--blue);font-weight:700}

/* ─── Modal ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border-radius:var(--r3);box-shadow:0 20px 60px rgba(0,0,0,.15);width:100%;max-height:90vh;overflow-y:auto;position:relative}
.modal-sm{max-width:380px}
.modal-md{max-width:540px}
.modal-lg{max-width:720px}
.modal-xl{max-width:900px}
.modal-close{position:absolute;top:16px;right:16px;width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--card2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--t3);transition:all .12s;z-index:10}
.modal-close:hover{background:var(--red2);color:var(--red);border-color:var(--red)}
.modal-header{padding:24px 24px 16px}
.modal-title{font-size:18px;font-weight:800;color:var(--t1);letter-spacing:-.3px}
.modal-subtitle{font-size:13px;color:var(--t3);margin-top:3px}
.modal-body{padding:0 24px 24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* ─── Info Row ─── */
.info-row{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-key{font-size:12px;font-weight:600;color:var(--t3);min-width:110px;padding-top:1px;flex-shrink:0}
.info-val{font-size:13px;color:var(--t1);flex:1;line-height:1.5}
.info-val a{color:var(--blue);text-decoration:underline}
.info-section{background:var(--card2);border-radius:var(--r);padding:12px 14px;margin-bottom:12px}

/* ─── Status ─── */
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-green{background:var(--green)}
.status-orange{background:var(--orange)}
.status-red{background:var(--red)}
.status-gray{background:var(--t3)}

/* ─── Matching ─── */
.match-progress{background:var(--card2);border-radius:var(--r2);padding:24px;text-align:center}
.match-anim{width:56px;height:56px;border-radius:50%;border:3px solid var(--blue2);border-top-color:var(--blue);animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.result-row{display:grid;grid-template-columns:140px 160px 120px 100px 90px 100px;gap:8px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px}
.result-row:last-child{border-bottom:none}
.result-header{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}

/* ─── Date chip ─── */
.date-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.date-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;background:var(--blue2);border:1px solid rgba(49,130,246,.2);font-size:12px;font-weight:600;color:var(--blue)}
.date-chip .chip-x{cursor:pointer;font-size:14px;line-height:1;margin-left:2px;color:var(--blue);opacity:.6}
.date-chip .chip-x:hover{opacity:1}

/* ─── Step indicator ─── */
.steps{display:flex;align-items:center;gap:0;margin-bottom:28px}
.step{display:flex;align-items:center;gap:8px}
.step-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.step.done .step-num{background:var(--green);color:#fff}
.step.active .step-num{background:var(--blue);color:#fff}
.step.pending .step-num{background:var(--card2);color:var(--t3);border:1.5px solid var(--border)}
.step-label{font-size:12.5px;font-weight:600;white-space:nowrap}
.step.done .step-label{color:var(--t2)}
.step.active .step-label{color:var(--blue)}
.step.pending .step-label{color:var(--t3)}
.step-line{flex:1;height:1.5px;background:var(--border);margin:0 4px;min-width:20px}

/* ─── Applicant Card ─── */
.applicant-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:16px;cursor:pointer;transition:all .15s}
.applicant-card:hover{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue2)}
.applicant-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#3182F6,#6366f1);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0}
.applicant-name{font-size:14px;font-weight:700;color:var(--t1)}
.applicant-meta{font-size:12px;color:var(--t3);margin-top:2px}

/* ─── Toast ─── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--t1);color:#fff;padding:10px 20px;border-radius:var(--r2);font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.2);display:flex;align-items:center;gap:8px;animation:toastIn .3s ease;white-space:nowrap}
.toast.error{background:var(--red)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ─── Page header ─── */
.page-header{margin-bottom:24px}
.page-title{font-size:22px;font-weight:900;color:var(--t1);letter-spacing:-.5px}
.page-subtitle{font-size:13.5px;color:var(--t3);margin-top:4px}

/* ─── Empty state ─── */
.empty{text-align:center;padding:48px 24px;color:var(--t3)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-text{font-size:14px;font-weight:600;color:var(--t2)}
.empty-sub{font-size:12.5px;color:var(--t3);margin-top:4px}

/* ─── Program info card ─── */
.prog-card{background:linear-gradient(135deg,#3182F6 0%,#6366f1 100%);border-radius:var(--r2);padding:20px 24px;color:#fff;margin-bottom:24px}
.prog-card-name{font-size:20px;font-weight:900;letter-spacing:-.4px}
.prog-card-period{font-size:13px;opacity:.85;margin-top:4px}
.prog-card-badges{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.prog-card-badge{padding:4px 10px;background:rgba(255,255,255,.2);border-radius:999px;font-size:12px;font-weight:600;color:#fff}

/* ─── Scrollbar ─── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--t3)}

/* ─── Utilities ─── */
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}
.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}
.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}.mb-6{margin-bottom:24px}
.text-xs{font-size:11.5px}.text-sm{font-size:12.5px}.text-base{font-size:14px}.text-lg{font-size:16px}
.font-bold{font-weight:700}.font-black{font-weight:900}.text-blue{color:var(--blue)}.text-red{color:var(--red)}.text-muted{color:var(--t3)}
.w-full{width:100%}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.p-3{padding:12px}.p-4{padding:16px}.rounded{border-radius:var(--r)}.rounded-lg{border-radius:var(--r2)}
.divider{height:1px;background:var(--border);margin:16px 0}
.link{color:var(--blue);cursor:pointer;font-weight:600;text-decoration:underline}
.chip-tag{display:inline-flex;align-items:center;padding:3px 8px;border-radius:999px;font-size:11.5px;font-weight:600;background:var(--card2);color:var(--t2);border:1px solid var(--border)}
</style>
</head>

<div id="app"></div>

<script>

const WEEKDAYS = ['일','월','화','수','목','금','토']
const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월']

function fmtDate(d) {
  if (!d) return ''
  const dt = new Date(d + 'T00:00:00')
  return `${dt.getMonth()+1}월 ${dt.getDate()}일(${WEEKDAYS[dt.getDay()]})`
}
function fmtDateShort(d) {
  if (!d) return ''
  const dt = new Date(d + 'T00:00:00')
  return `${dt.getMonth()+1}/${dt.getDate()}`
}
function modeName(m) { return m === 'online' ? '비대면(화상)' : '대면' }
function typeName(t) { return t === '1on1' ? '1:1 면접' : '그룹 면접' }
function modeColor(m) { return m === 'online' ? 'badge-blue' : 'badge-green' }
function typeColor(t) { return t === '1on1' ? 'badge-purple' : 'badge-orange' }

function getCompany(id) { return DB.companies.find(c=>c.id===id) }
function getStudent(id) { return DB.students.find(s=>s.id===id) }

function showToast(msg, type='ok') {
  S.toast = { msg, type }
  render()
  setTimeout(()=>{ S.toast=null; render() }, 2800)
}

function generateSlots(timeStart, timeEnd, slotMin) {
  const slots = []
  let [h,m] = timeStart.split(':').map(Number)
  const [eh,em] = timeEnd.split(':').map(Number)
  while (h*60+m+slotMin <= eh*60+em) {
    slots.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`)
    m += slotMin
    if (m >= 60) { h++; m -= 60 }
  }
  return slots
}

function runMatchingAlgo() {
  const prog = DB.program
  const results = []
  const failed = []

  DB.companies.forEach(co => {
    const applicants = DB.students.filter(s => s.apps.includes(co.id))
    const usedSlots = {} // date -> [time, ...]

    if (co.type === '1on1') {
      const withIntersection = applicants.map(s => {
        const inter = co.availDates.filter(d => (s.avail[co.id]||[]).includes(d))
        return { s, inter }
      }).sort((a,b) => a.inter.length - b.inter.length)

      withIntersection.forEach(({ s, inter }) => {
        if (inter.length === 0) {
          failed.push({ co, s, reason:'겹치는 날짜 없음' })
          return
        }
        for (const date of inter) {
          const slots = generateSlots(co.timeStart, co.timeEnd, prog.slotMinutes)
          const used = usedSlots[date] || []
          const avail = slots.find(sl => !used.includes(sl))
          if (avail) {
            if (!usedSlots[date]) usedSlots[date] = []
            usedSlots[date].push(avail)
            results.push({ co, students:[s], date, time:avail, type:'1:1', mode:co.mode })
            break
          }
        }
      })
    } else {
      // Group interview
      const sz = co.groupSize || 3
      const dateMap = {}
      const noMatch = []

      applicants.forEach(s => {
        const inter = co.availDates.filter(d => (s.avail[co.id]||[]).includes(d))
        if (inter.length === 0) {
          noMatch.push(s)
          return
        }
        // put on best date
        for (const d of inter) {
          if (!dateMap[d]) dateMap[d] = []
          dateMap[d].push(s)
          break
        }
      })

      noMatch.forEach(s => failed.push({ co, s, reason:'겹치는 날짜 없음' }))

      Object.entries(dateMap).forEach(([date, studs]) => {
        const slots = generateSlots(co.timeStart, co.timeEnd, prog.slotMinutes)
        let slotIdx = 0
        for (let i=0; i<studs.length; i+=sz) {
          const grp = studs.slice(i,i+sz)
          if (slotIdx < slots.length) {
            results.push({ co, students:grp, date, time:slots[slotIdx], type:`그룹(${grp.length}명)`, mode:co.mode })
            slotIdx++
          }
        }
      })
    }
  })

  S.matchResults = { results, failed }
  S.matchStatus = 'done'
  render()
}

function renderCalendar({ id, selected=[], highlight=[], year, month, readonly=false }) {
  const first = new Date(year, month, 1).getDay()
  const daysInMonth = new Date(year, month+1, 0).getDate()
  const prog = DB.program
  const pStart = prog.interviewStart
  const pEnd = prog.interviewEnd

  const cells = [...Array(first).fill(null), ...Array.from({length:daysInMonth},(_,i)=>i+1)]
  while (cells.length % 7 !== 0) cells.push(null)

  const prevM = month === 0 ? 11 : month - 1
  const prevY = month === 0 ? year - 1 : year
  const nextM = month === 11 ? 0 : month + 1
  const nextY = month === 11 ? year + 1 : year

  const rows = cells.reduce((acc,c,i)=>{ if(i%7===0) acc.push([]); acc[acc.length-1].push(c); return acc },[])

  return `
  <div class="cal-wrap">
    <div class="cal-header">
      <button class="cal-nav" onclick="calNav(${prevY},${prevM},'${id}')">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M10 4l-4 4 4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="cal-month">${year}년 ${MONTHS[month]}</div>
      <button class="cal-nav" onclick="calNav(${nextY},${nextM},'${id}')">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <div class="cal-grid">
      <div class="cal-days-header">
        ${WEEKDAYS.map((d,i)=>`<div class="cal-day-header" style="color:${i===0?'#ef4444':i===6?'var(--blue)':'var(--t3)'}">${d}</div>`).join('')}
      </div>
      <div class="cal-days">
        ${rows.flat().map((d,i) => {
          if (!d) return `<div class="cal-day empty"></div>`
          const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
          const isSelected = selected.includes(dateStr)
          const isHighlight = highlight.includes(dateStr)
          const inPeriod = dateStr >= pStart && dateStr <= pEnd
          const dow = i % 7
          let cls = 'cal-day'
          if (!inPeriod) cls += ' disabled'
          else cls += ' selectable in-period'
          if (isSelected) cls += ' selected'
          if (isHighlight && !isSelected) cls += ' in-period'
          if (dow === 0) cls += ' sunday'
          if (dow === 6) cls += ' saturday'
          if (readonly) cls = cls.replace('selectable','').replace('cursor:pointer','')
          return `<div class="${cls}" title="${fmtDate(dateStr)}" ${!readonly&&inPeriod?`onclick="calToggle('${id}','${dateStr}')"`:''}>
            ${d}
            ${isHighlight&&!isSelected?`<div style="position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--blue);opacity:.6"></div>`:''}
          </div>`
        }).join('')}
      </div>
    </div>
  </div>`
}

// Cal state per calendar id
const CAL_STATE = {}

function calNav(y, m, id) {
  CAL_STATE[id] = { year:y, month:m }
  render()
}

function calToggle(id, dateStr) {
  if (id === 'company-cal') {
    const co = getCompany(S.user.companyId)
    const idx = co.availDates.indexOf(dateStr)
    if (idx === -1) co.availDates.push(dateStr)
    else co.availDates.splice(idx, 1)
  } else if (id.startsWith('student-cal-')) {
    const coId = id.replace('student-cal-','')
    const st = getStudent(S.user.studentId)
    if (!st.avail[coId]) st.avail[coId] = []
    const idx = st.avail[coId].indexOf(dateStr)
    if (idx === -1) {
      st.avail[coId].push(dateStr)
    } else {
      st.avail[coId].splice(idx, 1)
    }
  }
  render()
}

function getCalState(id) {
  if (!CAL_STATE[id]) CAL_STATE[id] = { year:2025, month:7 }
  return CAL_STATE[id]
}

    ['matching','매칭 실행',`<path d="M18 4L6 20M6 4l12 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="6" cy="4" r="2" stroke="currentColor" stroke-width="1.8"/><circle cx="18" cy="4" r="2" stroke="currentColor" stroke-width="1.8"/><circle cx="6" cy="20" r="2" stroke="currentColor" stroke-width="1.8"/><circle cx="18" cy="20" r="2" stroke="currentColor" stroke-width="1.8"/>`],
    ['results','매칭 결과',`<path d="M9 11l3 3L22 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`],
  ]
  const sidebar = `
  <div class="nav-group">
    <div class="nav-group-label">운영 관리</div>
    ${navItems.map(([id,label,path])=>`
    <div class="nav-item ${S.tab===id?'active':''}" onclick="setTab('${id}')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none">${path}</svg>
      ${label}
    </div>`).join('')}
  </div>`
  let main = ''
  if (S.tab==='program') main = renderAdminProgram()
  else if (S.tab==='co-manage') main = renderAdminCompanies()
  else if (S.tab==='st-manage') main = renderAdminStudents()
  else if (S.tab==='matching') main = renderAdminMatching()
  else if (S.tab==='results') main = renderAdminResults()
  return renderApp(sidebar, main)
}

function submitStDates(coid) {
  const st = getStudent(S.user.studentId)
  if ((st.avail[coid]||[]).length === 0) return
  const allDone = st.apps.every(cid => (st.avail[cid]||[]).length > 0)
  if (allDone) { showToast('모든 기업 날짜 제출이 완료되었습니다!') }
  else { showToast(`${getCompany(coid).name} 날짜가 제출되었습니다`) }
  render()
}

function renderModal() {
  const m = S.modal
  if (!m) return ''
  let content = ''
  if (m.type === 'student-detail') content = renderStudentDetailModal(m.id)
  else if (m.type === 'edit-program') content = renderEditProgramModal()
  else if (m.type === 'company-detail') content = renderCompanyDetailModal(m.id)
  else if (m.type === 'add-company') content = renderAddCompanyModal()
  else if (m.type === 'add-student') content = renderAddStudentModal()
  else if (m.type === 'manual-match') content = renderManualMatchModal(m.coId, m.stId)
  return `<div class="modal-overlay" onclick="closeModal(event)">${content}</div>`
}

function closeModal(e) { if (e.target.classList.contains('modal-overlay')||e.target.classList.contains('modal-close')) { S.modal=null; render() } }

    <div class="modal-footer"><button class="btn btn-ghost" onclick="S.modal=null;render()">닫기</button></div>
  </div>`
}

function renderAddCompanyModal() {
  return `
  <div class="modal modal-md" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="S.modal=null;render()">×</button>
    <div class="modal-header"><div class="modal-title">기업 추가</div></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">기업명</label><input class="form-input" id="nc-name" placeholder="예) 카카오"></div>
        <div class="form-group"><label class="form-label">산업</label><input class="form-input" id="nc-industry" placeholder="예) IT"></div>
      </div>
      <div class="form-group"><label class="form-label">로그인 이메일</label><input class="form-input" id="nc-email" type="email" placeholder="company@intern.kr"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">비밀번호</label><input class="form-input" id="nc-pw" type="password" value="1234"></div>
        <div class="form-group"><label class="form-label">면접 방식</label>
          <select class="form-select" id="nc-mode"><option value="offline">대면</option><option value="online">비대면(화상)</option></select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="S.modal=null;render()">취소</button>
      <button class="btn btn-primary" onclick="addCompany()">기업 추가</button>
    </div>
  </div>`
}

function addCompany() {
  const name = document.getElementById('nc-name').value.trim()
  const industry = document.getElementById('nc-industry').value.trim()
  const email = document.getElementById('nc-email').value.trim()
  const mode = document.getElementById('nc-mode').value
  if (!name||!email) { showToast('기업명과 이메일을 입력하세요','error'); return }
  const id = 'c' + Date.now()
  DB.companies.push({ id, name, industry, email, mode, type:'1on1', groupSize:1, link:'', availDates:[], timeStart:'10:00', timeEnd:'17:00', submitted:false })
  ACCOUNTS[email] = { role:'company', id, pw:'1234' }
  S.modal = null; showToast(`${name}이 추가되었습니다!`)
}

function renderAddStudentModal() {
  return `
  <div class="modal modal-md" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="S.modal=null;render()">×</button>
    <div class="modal-header"><div class="modal-title">학생 추가</div></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">이름</label><input class="form-input" id="ns-name" placeholder="홍길동"></div>
        <div class="form-group"><label class="form-label">생년월일</label><input class="form-input" type="date" id="ns-birth"></div>
      </div>
      <div class="form-group"><label class="form-label">이메일 (로그인 ID)</label><input class="form-input" id="ns-email" type="email" placeholder="student@intern.kr"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">연락처</label><input class="form-input" id="ns-phone" placeholder="010-0000-0000"></div>
        <div class="form-group"><label class="form-label">주소</label><input class="form-input" id="ns-addr" placeholder="서울 강남구"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">학교명</label><input class="form-input" id="ns-school" placeholder="연세대학교"></div>
        <div class="form-group"><label class="form-label">학과</label><input class="form-input" id="ns-dept" placeholder="컴퓨터공학과"></div>
      </div>
      <div class="form-group"><label class="form-label">지원 기업 (최대 3개)</label>
        <div style="display:flex;flex-direction:column;gap:4px">
          ${DB.companies.map(c=>`<label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
            <input type="checkbox" class="ns-co-cb" value="${c.id}"> ${c.name}
          </label>`).join('')}
        </div>
        <div class="form-hint">최대 3개까지 선택 가능합니다</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="S.modal=null;render()">취소</button>
      <button class="btn btn-primary" onclick="addStudent()">학생 추가</button>
    </div>
  </div>`
}

function addStudent() {
  const name = document.getElementById('ns-name').value.trim()
  const email = document.getElementById('ns-email').value.trim()
  if (!name||!email) { showToast('이름과 이메일을 입력하세요','error'); return }
  const selected = [...document.querySelectorAll('.ns-co-cb:checked')].map(c=>c.value)
  if (selected.length > 3) { showToast('기업은 최대 3개까지 선택 가능합니다','error'); return }
  const id = 's' + Date.now()
  DB.students.push({
    id, name, birth: document.getElementById('ns-birth').value, phone: document.getElementById('ns-phone').value,
    email, addr: document.getElementById('ns-addr').value, edLevel:'대학교 재학',
    school: document.getElementById('ns-school').value, faculty:'', dept: document.getElementById('ns-dept').value,
    appDate: new Date().toISOString().split('T')[0], motivation:'', vision:'', experience:'',
    portfolio:'', resume:'', apps: selected, avail:{}
  })
  ACCOUNTS[email] = { role:'student', id, pw:'1234' }
  S.modal = null; showToast(`${name} 학생이 추가되었습니다!`)
}

function renderManualMatchModal(coId, stId) {
  const co = getCompany(coId), st = getStudent(stId)
  const slots = generateSlots(co.timeStart, co.timeEnd, DB.program.slotMinutes)
  return `
  <div class="modal modal-md" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="S.modal=null;render()">×</button>
    <div class="modal-header">
      <div class="modal-title">수동 배정</div>
      <div class="modal-subtitle">${co.name} ← ${st.name}</div>
    </div>
    <div class="modal-body">
      <div style="background:var(--red2);border:1px solid rgba(232,92,92,.2);border-radius:var(--r);padding:12px;font-size:12.5px;color:var(--red);margin-bottom:16px">
        ⚠ 겹치는 날짜가 없어 자동 매칭에 실패했습니다. 날짜와 시간을 직접 지정해주세요.
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">면접 날짜</label>
          <input class="form-input" type="date" id="mm-date" min="${DB.program.interviewStart}" max="${DB.program.interviewEnd}" value="${DB.program.interviewStart}">
        </div>
        <div class="form-group">
          <label class="form-label">면접 시간</label>
          <select class="form-select" id="mm-time">
            ${slots.slice(0,20).map(s=>`<option value="${s}">${s}</option>`).join('')}
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="S.modal=null;render()">취소</button>
      <button class="btn btn-primary" onclick="doManualMatch('${coId}','${stId}')">배정 확정</button>
    </div>
  </div>`
}

function doManualMatch(coId, stId) {
  const co = getCompany(coId), st = getStudent(stId)
  const date = document.getElementById('mm-date').value
  const time = document.getElementById('mm-time').value
  if (!S.matchResults) S.matchResults = { results:[], failed:[] }
  S.matchResults.failed = S.matchResults.failed.filter(f=>!(f.co.id===coId&&f.s.id===stId))
  S.matchResults.results.push({ co, students:[st], date, time, type:'1:1', mode:co.mode })
  S.modal = null; showToast(`${st.name} 수동 배정 완료!`)
}

// ─────────────────────────────────────────────────────
// MAIN RENDER
// ─────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app')
  if (S.view === 'login') app.innerHTML = renderLogin()
  else if (S.view === 'admin') app.innerHTML = renderAdmin()
  else if (S.view === 'company') app.innerHTML = renderCompany()
  else if (S.view === 'student') app.innerHTML = renderStudent()
  
  // Auto-fill login
  const emailEl = document.getElementById('login-email')
  const pwEl = document.getElementById('login-pw')
  if (emailEl) emailEl.value = loginEmail
  if (pwEl) pwEl.value = loginPw
}

render()
</script>
