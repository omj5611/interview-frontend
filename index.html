<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>면접 일정 자동 매칭 시스템 v2</title>

<!-- 폰트, 달력, 엑셀 파서 라이브러리 로드 -->
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F8FA;--card:#fff;--card2:#F2F4F6;--card3:#EAECEF;
  --border:#E5E8EB;--border2:#D1D5DB;
  --blue:#3182F6;--blue2:rgba(49,130,246,.08);--blue3:rgba(49,130,246,.16);
  --t1:#191919;--t2:#6B7280;--t3:#B0B8C1;--t4:#E5E8EB;
  --green:#17C964;--green2:rgba(23,201,100,.1);
  --red:#E85C5C;--red2:rgba(232,92,92,.1);
  --orange:#F59E0B;--orange2:rgba(245,158,11,.1);
  --purple:#7C3AED;--purple2:rgba(124,58,237,.1);
  --teal:#0891B2;--teal2:rgba(8,145,178,.1);
  --sh:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --sh2:0 4px 16px rgba(0,0,0,.08),0 12px 40px rgba(0,0,0,.06);
  --r:8px;--r2:12px;--r3:16px;
  --fn:'Pretendard Variable','Pretendard','Noto Sans KR',-apple-system,sans-serif
}
body{font-family:var(--fn);background:var(--bg);color:var(--t1);min-height:100vh;font-size:14px;line-height:1.5}
input,textarea,select,button{font-family:var(--fn)}
button{cursor:pointer;border:none;background:none}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* === LAYOUT === */
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{height:54px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;position:sticky;top:0;z-index:200;box-shadow:var(--sh)}
.logo{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:900;letter-spacing:-.5px;color:var(--t1)}
.logo-icon{width:30px;height:30px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:210px;background:var(--card);border-right:1px solid var(--border);padding:14px 10px;flex-shrink:0;height:calc(100vh - 54px);overflow-y:auto;position:sticky;top:54px}
.main{flex:1;padding:24px 28px;overflow-y:auto;height:calc(100vh - 54px)}

/* === NAV === */
.nav-section{margin-bottom:18px}
.nav-label{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;padding:0 8px;margin-bottom:5px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;transition:all .1s;margin-bottom:1px}
.nav-item:hover{background:var(--card2);color:var(--t1)}
.nav-item.active{background:var(--blue2);color:var(--blue);font-weight:700}
.nav-item .ni-icon{width:16px;height:16px;flex-shrink:0;opacity:.7}
.nav-item.active .ni-icon{opacity:1}

/* === BUTTONS === */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:0 14px;height:36px;border-radius:var(--r);font-size:13px;font-weight:600;transition:all .12s;cursor:pointer;border:none;flex-shrink:0;white-space:nowrap}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#2570e5}
.btn-outline-blue{background:transparent;color:var(--blue);border:1.5px solid var(--blue)}.btn-outline-blue:hover{background:var(--blue2)}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--card2);color:var(--t1)}
.btn-red{background:var(--red2);color:var(--red);border:1px solid rgba(232,92,92,.2)}.btn-red:hover{background:var(--red);color:#fff}
.btn-sm{height:28px;padding:0 10px;font-size:12px;border-radius:6px}
.btn-lg{height:44px;padding:0 22px;font-size:14px;font-weight:700}
.btn:disabled{opacity:0.5;cursor:not-allowed}

/* === FORM === */
.fg{margin-bottom:14px}
.fl{font-size:12px;font-weight:700;color:var(--t1);margin-bottom:5px;display:block}
.fi{width:100%;height:38px;padding:0 12px;border:1.5px solid var(--border);border-radius:var(--r);font-size:13px;color:var(--t1);background:var(--card2);outline:none;transition:border .15s}
.fi:focus{border-color:var(--blue);background:var(--card)}
.fs{width:100%;height:38px;padding:0 12px;border:1.5px solid var(--border);border-radius:var(--r);font-size:13px;color:var(--t1);background:var(--card2);outline:none;cursor:pointer;appearance:none}
.fs:focus{border-color:var(--blue);background:var(--card)}
.fta{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--r);font-size:13px;color:var(--t1);background:var(--card2);outline:none;resize:vertical;min-height:80px}
.fta:focus{border-color:var(--blue);background:var(--card)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* === CARD & GRID === */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);box-shadow:var(--sh)}
.ch{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.ct{font-size:15px;font-weight:700;color:var(--t1)}
.cb{padding:18px}
.company-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.acard{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:20px;cursor:pointer;transition:all .15s}
.acard:hover{border-color:var(--blue);box-shadow:0 4px 16px rgba(49,130,246,.1);transform:translateY(-2px)}
.acard-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.acard-name{font-size:16px;font-weight:800;color:var(--t1)}
.acard-meta{font-size:12px;color:var(--t2);margin-top:4px}
.acard-info{background:var(--card2);border-radius:var(--r);padding:12px;margin-bottom:12px}
.acard-row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px}
.acard-row:last-child{margin-bottom:0}

/* === BADGE & AVATAR === */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:999px;font-size:11.5px;font-weight:700;flex-shrink:0}
.b-blue{background:var(--blue2);color:var(--blue);border:1px solid rgba(49,130,246,.2)}
.b-green{background:var(--green2);color:#0ea05a;border:1px solid rgba(23,201,100,.2)}
.b-orange{background:var(--orange2);color:#d97706;border:1px solid rgba(245,158,11,.2)}
.b-red{background:var(--red2);color:var(--red);border:1px solid rgba(232,92,92,.2)}
.b-gray{background:var(--card2);color:var(--t2);border:1px solid var(--border)}
.b-purple{background:var(--purple2);color:var(--purple);border:1px solid rgba(124,58,237,.2)}
.avatar{border-radius:50%;background:linear-gradient(135deg,#3182F6,#7C3AED);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;flex-shrink:0}

/* === TABLE === */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:11.5px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;padding:12px 14px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;background:var(--card2); position:sticky; top:0; z-index:10}
td{font-size:13px;color:var(--t1);padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle; white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(49,130,246,.02)}
tr.clickable{cursor:pointer; transition:background .1s}

/* === MODAL & OVERLAY === */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px; backdrop-filter:blur(3px)}
.modal{background:var(--bg);border-radius:var(--r3);box-shadow:0 20px 60px rgba(0,0,0,.18);width:100%;max-height:95vh;display:flex;flex-direction:column;position:relative;animation:modalIn .2s ease; overflow:hidden}
@keyframes modalIn{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
.m-huge{max-width:1100px; height:90vh}
.m-mid{max-width:600px}
.mcl{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--t2);z-index:10;transition:all .15s}
.mcl:hover{background:var(--red2);color:var(--red);border-color:transparent}
.mh{padding:20px 24px; background:var(--card); border-bottom:1px solid var(--border); flex-shrink:0}
.mt{font-size:18px;font-weight:800;color:var(--t1);letter-spacing:-.3px}
.mb-scroll{flex:1; overflow-y:auto; padding:24px; background:var(--bg)}
.mf{padding:16px 24px; background:var(--card); border-top:1px solid var(--border); flex-shrink:0; display:flex; justify-content:flex-end; gap:8px}

/* === LOGIN & PROG SELECT === */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#EEF4FF 0%,#F7F8FA 55%,#F0FFF4 100%)}
.login-card{width:440px;background:var(--card);border:1px solid var(--border);border-radius:22px;box-shadow:var(--sh2);padding:38px 36px}
.role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.role-btn{padding:14px 6px;border-radius:var(--r2);border:2px solid var(--border);background:var(--card2);cursor:pointer;text-align:center;transition:all .15s}
.role-btn:hover, .role-btn.sel{border-color:var(--blue);background:var(--blue2)}

.prog-sel-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1.5px solid var(--border);border-radius:var(--r2);cursor:pointer;transition:all .15s;margin-bottom:8px;background:var(--card)}
.prog-sel-item:hover{border-color:var(--blue);background:var(--blue2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(49,130,246,.08)}

/* === SEG (TOGGLE TABS) === */
.seg{display:flex;border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--card2)}
.seg-btn{flex:1;height:36px;font-size:13px;font-weight:600;color:var(--t2);background:transparent;border:none;cursor:pointer;transition:all .12s}
.seg-btn.on{background:var(--blue);color:#fff;font-weight:700}

/* === CALENDAR & CHIPS === */
.cal{border:1.5px solid var(--border);border-radius:var(--r2);overflow:hidden;background:var(--card)}
.cal-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--card2);border-bottom:1px solid var(--border)}
.cal-nav{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);transition:all .12s}
.cal-nav:hover{background:var(--blue2);border-color:var(--blue);color:var(--blue)}
.cal-mo{font-size:14px;font-weight:700;color:var(--t1)}
.cal-body{padding:10px}
.cal-wk{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px}
.cal-wh{text-align:center;font-size:10.5px;font-weight:600;color:var(--t3);padding:3px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:12.5px;border-radius:7px;cursor:pointer;transition:all .12s;border:1.5px solid transparent;position:relative;font-weight:400}
.cal-d.empty,.cal-d.disabled{pointer-events:none}
.cal-d.disabled{opacity:.3}
.cal-d.in-period{background:rgba(49,130,246,.04)}
.cal-d.sel:hover,.cal-d.hi:hover,.cal-d.in-period:hover{background:var(--blue2);border-color:rgba(49,130,246,.3)}
.cal-d.sel{background:var(--blue)!important;color:#fff!important;font-weight:700;border-color:var(--blue)}
.cal-d.hi:not(.sel){border-color:rgba(49,130,246,.25)}
.cal-d.sun{color:#ef4444}.cal-d.sat{color:var(--blue)}.cal-d.sel.sun,.cal-d.sel.sat{color:#fff!important}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:999px;background:var(--blue2);border:1px solid rgba(49,130,246,.2);font-size:12px;font-weight:600;color:var(--blue)}
.chip-x{cursor:pointer;font-size:13px;line-height:1;opacity:.6;margin-left:2px}.chip-x:hover{opacity:1}

/* === TOGGLE SWITCH === */
.tgl-wrap{display:flex;align-items:center;gap:8px;cursor:pointer}
.tgl{width:36px;height:20px;border-radius:10px;background:var(--border2);position:relative;transition:background .2s;flex-shrink:0}
.tgl.on{background:var(--blue)}
.tgl::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tgl.on::after{left:19px}

/* === EDITOR === */
.editor-wrap{border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--card);transition:border .15s}
.editor-wrap:focus-within{border-color:var(--blue)}
.editor-toolbar{background:var(--card2);padding:8px 12px;border-bottom:1px solid var(--border);display:flex;gap:6px;align-items:center}
.e-btn{width:28px;height:28px;border-radius:4px;border:none;background:transparent;color:var(--t2);font-size:14px;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s}
.e-btn:hover{background:var(--border);color:var(--t1)}
.editor-content{min-height:300px;padding:16px;outline:none;font-size:14px;line-height:1.7;color:var(--t1)}
.editor-content:empty::before{content:attr(placeholder);color:var(--t3);pointer-events:none;display:block}

/* === MISC === */
.ph{margin-bottom:22px}.ph-t{font-size:21px;font-weight:900;color:var(--t1);letter-spacing:-.5px}.ph-s{font-size:13px;color:var(--t3);margin-top:3px}
.flex{display:flex}.aic{align-items:center}.jb{justify-content:space-between}.gap2{gap:8px}.gap3{gap:12px}.gap4{gap:16px}
.w-full{width:100%}
.empty{text-align:center;padding:44px 20px;color:var(--t3)}
.divider{height:1px; background:var(--border); margin:20px 0;}

/* File Input Custom */
.file-drop-area{border:2px dashed var(--blue);border-radius:var(--r2);padding:40px 20px;text-align:center;background:var(--blue2);cursor:pointer;transition:all .2s}
.file-drop-area:hover{background:rgba(49,130,246,.12)}
.file-msg{font-size:14px;font-weight:700;color:var(--blue);margin-bottom:6px}
.file-sub{font-size:12px;color:var(--t2)}

/* Toasts */
.toast-wrap{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none}
.toast{background:var(--t1);color:#fff;padding:9px 18px;border-radius:var(--r2);font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.2);display:flex;align-items:center;gap:8px;animation:toastIn .25s ease;white-space:nowrap}
.toast.err{background:var(--red)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>

const fmtDate=d=>{if(!d)return'';const dt=new Date(d+'T00:00:00');return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`}
const fmtShort=d=>{if(!d)return'';const dt=new Date(d+'T00:00:00');return`${dt.getMonth()+1}/${dt.getDate()}`}
const t2m=t=>{const[h,m]=t.split(':').map(Number);return h*60+m}
const m2t=m=>`${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`
const getCo=id=>DB.companies.find(c=>c.id===id)
const getSt=id=>DB.students.find(s=>s.id===id)

function showToast(msg,type='ok'){
  const id=Date.now()
  S.toasts.push({id,msg,type})
  render()
  setTimeout(()=>{S.toasts=S.toasts.filter(t=>t.id!==id);render()},2800)
}

function copyLink(link) {
  const el = document.createElement('textarea');
  el.value = link;
  document.body.appendChild(el);
  el.select();
  document.execCommand('copy');
  document.body.removeChild(el);
  showToast('면접 화상 링크가 복사되었습니다.');
}

function calState(id){if(!S.calStates[id])S.calStates[id]={y:2025,m:7};return S.calStates[id]}
function calNav(id,y,m){S.calStates[id]={y,m};render()}

function renderCal({id,sel=[],hi=[],readonly=false}){
  const cs=calState(id)
  const {y,m}=cs
  const p=S.prog || PROGRAMS[0]
  const pS=p.interviewStart, pE=p.interviewEnd
  const first=new Date(y,m,1).getDay()
  const dim=new Date(y,m+1,0).getDate()
  const prevY=m===0?y-1:y, prevM=m===0?11:m-1
  const nextY=m===11?y+1:y, nextM=m===11?0:m+1
  const cells=[...Array(first).fill(null),...Array.from({length:dim},(_,i)=>i+1)]
  while(cells.length%7)cells.push(null)
  return`<div class="cal">
    <div class="cal-hd">
      <button class="cal-nav" onclick="calNav('${id}',${prevY},${prevM})"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M10 4l-4 4 4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button>
      <div class="cal-mo">${y}년 ${MONTHS[m]}</div>
      <button class="cal-nav" onclick="calNav('${id}',${nextY},${nextM})"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button>
    </div>
    <div class="cal-body">
      <div class="cal-wk">${WEEKDAYS.map((w,i)=>`<div class="cal-wh" style="color:${i===0?'#ef4444':i===6?'var(--blue)':'var(--t3)'}">${w}</div>`).join('')}</div>
      <div class="cal-grid">${cells.map((d,i)=>{
        if(!d)return`<div class="cal-d empty"></div>`
        const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
        const inP = (ds>=pS && ds<=pE)
        const isSel=sel.includes(ds), isHi=hi.includes(ds)
        let cls='cal-d'
        if(!inP) cls+=' disabled'
        else cls+=' in-period'
        if(isSel) cls+=' sel'
        else if(isHi) cls+=' hi'
        if(i%7===0) cls+=' sun'; if(i%7===6) cls+=' sat'
        const onclick=readonly?'':inP?`onclick="calToggle('${id}','${ds}')"`:`onclick=""`
        return`<div class="${cls}" ${onclick} title="${fmtDate(ds)}">${d}${isHi&&!isSel?`<div style="position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:var(--blue);opacity:.7"></div>`:''}</div>`
      }).join('')}</div>
    </div>
  </div>`
}

function calToggle(id,ds){
  if(id==='co-cal'){
    const co=getCo(S.user.companyId)
    if(!co.dateSlots) co.dateSlots = {}
    const dates=Object.keys(co.dateSlots)
    if(dates.indexOf(ds)===-1){co.dateSlots[ds]=[{start:'10:00',end:'17:00'}]}
    else{delete co.dateSlots[ds]}
  } else if(id.startsWith('st-cal-')){
    const coId=id.replace('st-cal-','')
    const st=getSt(S.user.studentId)
    if(!st.avail[coId])st.avail[coId]=[]
    const i=st.avail[coId].indexOf(ds)
    if(i===-1)st.avail[coId].push(ds)
    else st.avail[coId].splice(i,1)
  }
  render()
}

function changeStudentStatus(stId, coId, val) {
  const st = getSt(stId);
  if(!st.interviewStatus) st.interviewStatus = {};
  st.interviewStatus[coId] = val;
  render();
  
  if (S.user.role === 'company') {
    const apps = DB.students.filter(x => x.apps.includes(coId));
    const allEval = apps.every(x => ['pass', 'fail', 'pre'].includes(x.interviewStatus[coId]));
    const co = getCo(coId);
    if (allEval && !co.evaluationSubmitted) {
      S.modal = { type: 'eval-complete', coId };
      render();
    }
  }
}

function submitEvaluations(coId) {
  const co = getCo(coId);
  co.evaluationSubmitted = true;
  co.status = 'selection_complete';
  S.modal = null;
  showToast('모든 평가 결과가 운영진에게 제출되었습니다.');
  render();
}

// ─── 2. 면접관리 / 타임테이블 등 ─────────────────────────
function runMatching() {
  const matches = [];
  const failed = [];
  const adminTracker = {}; // [date][time] = count (max 3)
  const companyTracker = {}; // [coId][date][time] = true
  const p = S.prog || PROGRAMS[0];

  const generateIntervals = (start, end, step) => {
    const res = [];
    let curr = t2m(start);
    const endM = t2m(end);
    while(curr + step <= endM) { res.push(m2t(curr)); curr += step; }
    return res;
  };

  const cos = DB.companies.filter(c => c.submitted && c.status !== 'selection_complete');

  cos.forEach(co => {
    const slotMin = co.slotMinutes || p.slotMinutes || 30; // 개별 기업 슬롯 반영
    const apps = DB.students.filter(s => s.apps.includes(co.id) && s.avail[co.id] && s.avail[co.id].length > 0);
    
    apps.forEach(st => {
      let assigned = false;
      const stDates = st.avail[co.id];

      for(const d of stDates) {
        if(!co.dateSlots[d]) continue;
        if(!adminTracker[d]) adminTracker[d] = {};
        if(!companyTracker[co.id]) companyTracker[co.id] = {};
        if(!companyTracker[co.id][d]) companyTracker[co.id][d] = {};

        for(const slot of co.dateSlots[d]) {
          const intervals = generateIntervals(slot.start, slot.end, slotMin);
          for(const time of intervals) {
            const adminCount = adminTracker[d][time] || 0;
            const coBusy = companyTracker[co.id][d][time];

            const isOnline = co.mode === 'online';
            
            // 대면(Offline)은 운영진 모니터링(최대 3명) 제한을 받지 않음
            if ((!isOnline || adminCount < 3) && !coBusy) {
              if (isOnline) adminTracker[d][time] = adminCount + 1;
              companyTracker[co.id][d][time] = true;
              
              const videoLink = isOnline ? 'https://meet.intern.kr/room-' + Math.random().toString(36).substr(2, 6) : null;
              const address = !isOnline ? co.address : null;
              
              matches.push({ coId: co.id, coName: co.name, stId: st.id, stName: st.name, date: d, time: time, mode: co.mode, videoLink, address });
              assigned = true;
              if(!st.interviewStatus) st.interviewStatus = {};
              st.interviewStatus[co.id] = 'wait'; 
              break;
            }
          }
          if(assigned) break;
        }
        if(assigned) break;
      }
      if(!assigned) failed.push({ coId: co.id, coName: co.name, stId: st.id, stName: st.name });
    });
    co.status = 'select_done';
  });

  S.matchResults = { matches, failed };
  S.adminSubView = 'timetable';
  S.timetableTab = 'online';
  showToast('자동 매칭이 완료되었습니다! (비대면-동시간 3팀 제한 / 대면-제한없음)');
  render();
}

            </div>`
          }).join('')}
        </div>
      </div>
    </div>` : ''}

    <div class="seg mb4" style="max-width:400px">
      <button class="seg-btn ${S.timetableTab==='online'?'on':''}" onclick="S.timetableTab='online';render()">💻 비대면 면접 (모니터링)</button>

function renderTimetableOnline(onlineMatches) {
  if (onlineMatches.length === 0) return `<div class="card"><div class="empty">확정된 비대면 면접 일정이 없습니다.</div></div>`;
  const dates = [...new Set(onlineMatches.map(m => m.date))].sort();
  let html = '';

  dates.forEach(d => {
    html += `<div style="font-size:16px; font-weight:800; color:var(--blue); margin-top:24px; margin-bottom:12px;">🗓 ${fmtDate(d)}</div>`;
    html += `<div class="card"><div class="tw"><table>
      <thead>
        <tr><th style="width:100px; text-align:center">시간</th><th>모니터링 룸 1</th><th>모니터링 룸 2</th><th>모니터링 룸 3</th></tr>
      </thead>
      <tbody>`;
    
    const dayMatches = onlineMatches.filter(m => m.date === d);
    const times = [...new Set(dayMatches.map(m => m.time))].sort();

    times.forEach(t => {
      const timeMatches = dayMatches.filter(m => m.time === t);
      html += `<tr><td style="font-weight:800; text-align:center; color:var(--t2)">${t}</td>`;
      for(let i=0; i<3; i++) {
         const match = timeMatches[i];
         if(match) {
            html += `<td>
              <span class="badge b-purple" style="margin-bottom:4px">${match.coName}</span><br>
              <span style="font-weight:700; font-size:14px">${match.stName}</span> 면접자<br>
              <a href="${match.videoLink}" target="_blank" class="badge b-blue" style="margin-top:6px;text-decoration:none">🔗 화상방 입장</a>
            </td>`;
         } else {
            html += `<td><span style="color:var(--t3)">- 대기 -</span></td>`;
         }
      }
      html += `</tr>`;
    });
    html += `</tbody></table></div></div>`;
  });
  return html;
}

function renderTimetableOffline(offlineMatches) {
  if (offlineMatches.length === 0) return `<div class="card"><div class="empty">확정된 대면 면접 일정이 없습니다.</div></div>`;
  const dates = [...new Set(offlineMatches.map(m => m.date))].sort();
  let html = '';

  dates.forEach(d => {
    html += `<div style="font-size:16px; font-weight:800; color:var(--green); margin-top:24px; margin-bottom:12px;">🗓 ${fmtDate(d)} (대면)</div>`;
    html += `<div class="card"><div class="tw"><table>
      <thead>
        <tr><th style="width:100px; text-align:center">시간</th><th>기업명</th><th>면접자</th><th>면접 장소 (주소)</th></tr>
      </thead>
      <tbody>`;
    
    const dayMatches = offlineMatches.filter(m => m.date === d);
    dayMatches.sort((a,b) => t2m(a.time) - t2m(b.time)).forEach(m => {
      html += `<tr>
        <td style="font-weight:800; text-align:center; color:var(--t2)">${m.time}</td>
        <td><span class="badge b-green">${m.coName}</span></td>
        <td style="font-weight:700">${m.stName}</td>
        <td style="color:var(--t2)">${m.address || '미입력'}</td>
      </tr>`;
    });
    html += `</tbody></table></div></div>`;
  });
  return html;
}

    if(match) {

function saveManualData() {
  let count = 0;
  S.manualDrafts.forEach(d => {
    if(!d.name) return;
    const coId = d.targetCompanyName ? getOrCreateCompany(d.targetCompanyName) : null;
    
    const pLink = d.useDriveLink ? d.portfolioLink : (d.portfolioFileName ? 'dummy_file_path' : '');
    const rLink = d.useDriveLink ? d.resumeLink : (d.resumeFileName ? 'dummy_file_path' : '');

    DB.students.push({ 
      id: 's_' + Date.now() + Math.floor(Math.random()*1000), 
      apps: coId ? [coId] : [], avail: {}, interviewStatus: {}, reports: {}, 
      portfolioLink: pLink, resumeLink: rLink, ...d 
    });
    count++;
  });
  if(count === 0) { alert('입력된 이름이 없습니다.'); return; }
  showToast(`${count}명의 면접자 등록 완료`); closeAddDataModal();
}

function handleExcelUpload(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(evt) {
    try {
      const data = new Uint8Array(evt.target.result);
      const workbook = XLSX.read(data, {type: 'array'});
      const worksheet = workbook.Sheets[workbook.SheetNames[0]];
      const rawJson = XLSX.utils.sheet_to_json(worksheet, {range: 1, defval: ""}); 
      S.excelParsedData = rawJson.map(row => {
        const match = (row['프로그램명'] || '').match(/^\[(.*?)\]/);
        const companyName = match ? match[1].trim() : '미분류기업';
        return {
          id: 's_' + Date.now() + Math.random().toString(36).substr(2, 5), targetCompanyName: companyName,
          name: row['이름'] || '이름없음', appDate: row['신청일자'] || '', birth: row['생년월일'] || '', addr: row['주소'] || '', phone: row['휴대전화번호'] || '', email: row['이메일'] || '',
          edLevel: row['학력'] || '', school: row['학교'] || '', faculty: row['학부'] || '', dept: row['학과'] || '', 
          participationCount: row['연간참여횟수'] || '0', nationalEmpSupport: row['국민취업지원제도참여여부'] || 'N', empInsurance: row['고용보험가입여부'] || 'N', privacyConsent: row['개인정보활용동의여부'] || 'N', anomalyCheck: row['확인내용이상여부'] || 'N', hasAttachment: row['첨부파일유무'] || 'N',

          apps: [], avail: {}, interviewStatus: {}, reports: {}, portfolioLink: '', resumeLink: ''
        };
      });
      render();
    } catch (err) { alert("파싱 실패"); }
  };
  reader.readAsArrayBuffer(file);
}

function getOrCreateCompany(companyName) {
  let co = DB.companies.find(c => c.name === companyName);
  if (!co) { co = { id: 'c_' + Date.now() + Math.floor(Math.random()*1000), name: companyName, industry: '분류 전', mode: 'online', type: '1on1', status: 'before_select', submitted: false, dateSlots: {} }; DB.companies.push(co); }

                <div onclick="S.activeVideoStId='${m.stId}';render()" style="padding:12px; border-radius:var(--r); border:1px solid ${S.activeVideoStId===m.stId?'var(--blue)':'var(--border)'}; background:${S.activeVideoStId===m.stId?'var(--blue2)':'var(--card)'}; cursor:pointer; margin-bottom:8px;">
                  <div style="font-weight:700; font-size:14px; color:${S.activeVideoStId===m.stId?'var(--blue)':'var(--t1)'}">${m.stName} 면접자</div>
                  <div style="font-size:11px; color:var(--t2); margin-top:4px;">🕒 배정 시간: ${m.time}</div>
                </div>
              `).join('')}
            </div>
          </div>
          
          <!-- Center: Video(2/3) & Detail(1/3) -->
          <div style="flex:1; display:flex; flex-direction:column; gap:16px; min-width:0;">
            <!-- BLACK BOX FOR VIDEO -->
            <div style="flex:2; background:#000; border-radius:var(--r2); display:flex; align-items:center; justify-content:center; color:#555; font-size:15px; font-weight:600; position:relative; min-height:0;">
              (화상 화면 영역 - 추후 기능 연동 예정)
              <div style="position:absolute; top:16px; left:16px; background:rgba(255,255,255,0.1); color:#fff; padding:6px 12px; border-radius:20px; font-size:12px; font-weight:700; border:1px solid rgba(255,255,255,0.2);">
                현재 연결: ${activeSt.name} 면접자
              </div>
            </div>
             
            <!-- Detail Region -->
            <div style="flex:1; background:var(--card); border-radius:var(--r2); border:1px solid var(--border); padding:20px; overflow-y:auto; min-height:0;">
              <div style="font-weight:800; font-size:16px; margin-bottom:12px; color:var(--blue)">${activeSt.name} 상세 정보</div>
              <div class="frow" style="align-items:flex-start">
                <div>
                   <div style="font-size:11px;color:var(--t3)">학교/학과</div>
                   <div style="font-size:13px;font-weight:600;margin-bottom:8px">${activeSt.school||'-'} ${activeSt.dept||'-'}</div>
                   <div style="font-size:11px;color:var(--t3)">관련 경험</div>
                   <div style="font-size:13px;font-weight:600;margin-bottom:8px; max-height:40px; overflow:hidden; text-overflow:ellipsis">${activeSt.experience||'-'}</div>
                </div>
                <div>
                   <div style="font-size:11px;color:var(--t3)">지원동기</div>
                   <div style="font-size:13px;font-weight:600;margin-bottom:8px; max-height:80px; overflow:hidden; text-overflow:ellipsis">${activeSt.motivation||'-'}</div>
                </div>
              </div>
              <div class="flex gap2 mt3">
                <button class="btn btn-outline-blue btn-sm" onclick="window.open('${activeSt.portfolioLink||'#'}')">포트폴리오 조회</button>
                <button class="btn btn-outline-blue btn-sm" onclick="window.open('${activeSt.resumeLink||'#'}')">이력서 열람</button>
              </div>
            </div>
          </div>
          
          <!-- Right: Waiting Room Preview -->
          <div style="width:240px; background:var(--card2); border-radius:var(--r2); border:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0;">
             <div style="padding:14px; border-bottom:1px solid var(--border); font-weight:800; display:flex; align-items:center; gap:6px; font-size:14px;">
               <span style="display:inline-block; width:8px; height:8px; background:var(--green); border-radius:50%;"></span> 대기방 미리보기 (소리X)
             </div>
             <div style="flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:10px;">
               ${scheduled.filter(m => m.stId !== S.activeVideoStId).map(m => `
                 <div style="background:#222; border-radius:8px; aspect-ratio:4/3; position:relative; display:flex; align-items:center; justify-content:center; color:#777; font-size:12px; border:1px solid #444;">
                   <div style="position:absolute; bottom:6px; left:6px; font-size:11px; color:#fff; background:rgba(0,0,0,0.6); padding:2px 6px; border-radius:4px;">${m.stName} 대기중</div>
                   🎥 화면
                 </div>
               `).join('')}
               ${scheduled.length <= 1 ? `<div class="empty" style="padding:20px 0; font-size:12px">대기 중인 인원이 없습니다.</div>` : ''}
             </div>
          </div>
          
        </div>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════
// STUDENT VIEW
// ═══════════════════════════════════════════
const ST_NAV=[
  {id:'st-status',label:'지원 현황',ico:'<path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a1 1 0 0 0-1 1v0a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v0a1 1 0 0 0-1-1H9z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>'},
  {id:'st-dates',label:'날짜 선택',ico:'<rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.8"/><line x1="16" y1="2" x2="16" y2="6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="8" y1="2" x2="8" y2="6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="1.8"/>'},
]

function renderStudent(){
  const st=getSt(S.user.studentId)
  const sidebar=`
  <div style="padding:12px 8px;margin-bottom:10px;border-bottom:1px solid var(--border)">
    <div class="flex aic gap2 mb2">
      <div class="avatar" style="width:36px;height:36px;font-size:14px">${st.name[0]}</div>
      <div><div style="font-size:13.5px;font-weight:800">${st.name}</div><div style="font-size:11px;color:var(--t3)">${st.school||'-'}</div></div>
    </div>
  </div>
  <div class="nav-section">
    <div class="nav-label">면접자 메뉴</div>
    ${ST_NAV.map(n=>`<div class="nav-item ${S.tab===n.id?'active':''}" onclick="S.tab='${n.id}';render()">
      <svg class="ni-icon" viewBox="0 0 24 24" fill="none">${n.ico}</svg>${n.label}
    </div>`).join('')}
  </div>`
  let main=''
  if(S.tab==='st-status') main=renderStStatus()
  else if(S.tab==='st-dates') main=renderStDates()
  return renderShell(sidebar,main)
}

function renderStStatus(){
  const st=getSt(S.user.studentId)
  const p=S.prog||PROGRAMS[0]
  return`<div>
  <div class="ph"><div class="ph-t">지원 현황</div><div class="ph-s">${p.name}</div></div>
  <div class="prog-hero mb4">
    <div class="prog-hero-name">${p.name}</div>
    <div class="prog-hero-period">면접 기간 ${fmtDate(p.interviewStart)} ~ ${fmtDate(p.interviewEnd)}</div>
    <div class="prog-hero-badges"><span class="prog-hero-badge">마감 ${fmtDate(p.studentDeadline)}</span></div>
  </div>
  ${st.apps.map(cid=>{
    const co=getCo(cid)
    const myD=st.avail[cid]||[]
    return`<div style="display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:10px;box-shadow:var(--sh)">
      <div style="width:40px;height:40px;border-radius:var(--r);background:var(--blue2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">🏢</div>
      <div style="flex:1"><div style="font-size:14px;font-weight:700">${co.name}</div></div>
      <div style="text-align:right"><div style="font-size:11px;color:var(--t3)">선택 날짜</div><div style="font-size:15px;font-weight:800;color:${myD.length>0?'var(--blue)':'var(--orange)'}">${myD.length}일</div></div>
      <span class="badge ${myD.length>0?'b-green':'b-orange'}">${myD.length>0?'완료':'미제출'}</span>
    </div>`
  }).join('')}
  <button class="btn btn-blue btn-lg mt3" onclick="S.tab='st-dates';render()">날짜 선택하러 가기 →</button>
  </div>`
}

function renderStDates(){
  const st=getSt(S.user.studentId)
  if(!st.apps || st.apps.length===0) return `<div class="empty">지원한 기업이 없습니다.</div>`
  if(!S.activeStCo) S.activeStCo=st.apps[0]
  const coid=S.activeStCo
  const co=getCo(coid)
  const myD=st.avail[coid]||[]
  const hi=co.dateSlots ? Object.keys(co.dateSlots) : []
  
  return`<div>
  <div class="ph"><div class="ph-t">면접 가능 날짜 선택</div><div class="ph-s">기업이 선택한 날짜 중 가능한 날짜를 달력에서 클릭하세요</div></div>
  <div class="seg mb4" style="max-width:400px">
    ${st.apps.map(cid=>{
      const co2=getCo(cid),cnt=(st.avail[cid]||[]).length
      return`<button class="seg-btn ${coid===cid?'on':''}" onclick="S.activeStCo='${cid}';render()">${co2.name} (${cnt})</button>`
    }).join('')}
  </div>
  <div style="display:grid;grid-template-columns:310px 1fr;gap:20px;align-items:start">
    <div>${renderCal({id:`st-cal-${coid}`,sel:myD,hi})}</div>
    <div>
      <div class="card">
        <div class="ch"><div class="ct">${co.name} 면접 정보</div></div>
        <div class="cb">
          <div style="font-size:13px;font-weight:600;margin-bottom:6px">내가 선택한 날짜 (${myD.length}일)</div>
          ${myD.length===0?`<div style="font-size:12.5px;color:var(--t3)">달력에서 날짜를 선택해주세요</div>`:`<div class="chips">${myD.sort().map(d=>`<div class="chip">${fmtDate(d)}<span class="chip-x" onclick="calToggle('st-cal-${coid}','${d}')">×</span></div>`).join('')}</div>`}
        </div>
      </div>
      <button class="btn btn-blue btn-lg w-full mt3" onclick="showToast('날짜 제출 완료');render()" ${myD.length===0?'disabled':''}>날짜 제출 (${myD.length}일)</button>
    </div>
  </div></div>`
}

function renderModalWrapper() {
  const m = S.modal;
  if(!m) return '';
  if(m.type === 'co-write-inquiry') {
    return `<div class="ov" onmousedown="if(event.target===this){S.modal=null;render()}">
      <div class="modal m-mid">
        <button class="mcl" onclick="S.modal=null;render()">×</button>
        <div class="mh"><div class="mt">운영진에게 문의하기</div></div>
        <div class="mb-scroll">
          <div class="fg"><label class="fl">제목</label><input class="fi" id="inq-w-title" placeholder="문의 제목을 입력하세요."></div>
          <div class="fg"><label class="fl">내용</label><textarea class="fta" id="inq-w-content" style="min-height:150px" placeholder="문의 내용을 상세히 작성해주세요."></textarea></div>
        </div>
        <div class="mf">
          <button class="btn btn-ghost" onclick="S.modal=null;render()">취소</button>
          <button class="btn btn-blue" onclick="submitCoInquiry()">문의 등록</button>
        </div>
      </div>
    </div>`;
  }
  return renderModal(); // Fallback for other modals
}

// ═══════════════════════════════════════════
// INITIAL RENDER
// ═══════════════════════════════════════════
function render(){
  const app=document.getElementById('app')
  if(S.view==='login') app.innerHTML=renderLogin()
  else if(S.view==='prog-select') app.innerHTML=renderProgSelectView()
  else if(S.view==='admin') app.innerHTML=renderAdmin()
  else if(S.view==='company') app.innerHTML=renderCompany()
  else if(S.view==='student') app.innerHTML=renderStudent()
  
  if(S.view==='login'){
     const em=document.querySelector('input[type="email"]'); const pw=document.querySelector('input[type="password"]');
     if(em)em.value=S.loginEmail; if(pw)pw.value=S.loginPw;
  }
  
  // Custom Modal override for Company Inquiry Write
  if(S.modal && S.modal.type === 'co-write-inquiry') {
     document.body.insertAdjacentHTML('beforeend', renderModalWrapper());
  }

  if((S.view==='admin' || S.view==='company') && S.tab==='settings') {
     // Admin settings tab logic
     setTimeout(() => {
        const el = document.getElementById("set-interview-range");
        if(el) {
          flatpickr(el, {
             mode: "range", locale: "ko", dateFormat: "Y-m-d", minDate: "today",
             defaultDate: (S.prog && S.prog.interviewStart && S.prog.interviewEnd) ? [S.prog.interviewStart, S.prog.interviewEnd] : null,
             locale: { rangeSeparator: " ~ " }
          });
        }
     }, 0);
  }
}

// 초기 호출 전 기존에 렌더링된 요소 중복 삽입 방지 (body end tag logic)
const _render = render;
render = function() {
    const overlays = document.querySelectorAll('.ov');
    overlays.forEach(o => { if(!o.closest('#app')) o.remove(); }); // remove floating modals
    _render();
}

render()
</script>
</body>
</html>
