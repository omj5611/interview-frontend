/* === MODALS & OVERLAYS === */
.ov { position: fixed; inset: 0; background: rgba(17, 24, 39, 0.4); backdrop-filter: blur(4px); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: var(--sp-6); animation: fadeIn 0.2s ease; }

const fmtDate=d=>{if(!d)return'';const dt=new Date(d+'T00:00:00');return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`}
const fmtShort=d=>{if(!d)return'';const dt=new Date(d+'T00:00:00');return`${dt.getMonth()+1}/${dt.getDate()}`}
const t2m=t=>{const[h,m]=t.split(':').map(Number);return h*60+m}
const m2t=m=>`${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`
const getCo=id=>DB.companies.find(c=>c.id===id)
const getSt=id=>DB.students.find(s=>s.id===id)
const modeLbl=m=>m==='online'?'비대면(화상)':'대면'
const typeLbl=t=>t==='1on1'?'1:1 면접':'그룹 면접'
const modeClr=m=>m==='online'?'b-blue':'b-green'
const typeClr=t=>t==='1on1'?'b-purple':'b-orange'

// Generate Slots helper
function generateIntervals(start, end, step) {
  const res = []; let curr = t2m(start); const endM = t2m(end);
  while(curr + step <= endM) { res.push(m2t(curr)); curr += step; }
  return res;
}

function showToast(msg,type='ok'){
  const id=Date.now()
  S.toasts.push({id,msg,type})
  render()
  setTimeout(()=>{S.toasts=S.toasts.filter(t=>t.id!==id);render()},2800)
}

function copyLink(link) {
  const el = document.createElement('textarea');
  el.value = link; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
  showToast('면접 화상 링크가 복사되었습니다.');
}

function calState(id){if(!S.calStates[id])S.calStates[id]={y:2025,m:7};return S.calStates[id]}
function calNav(id,y,m){S.calStates[id]={y,m};render()}

// Minimalist Calendar Render
function renderCal({id,sel=[],hi=[],readonly=false, onClickDate=null}){
  const cs=calState(id)
  const {y,m}=cs
  const p=S.prog || PROGRAMS[0]
  const pS=p.interviewStart, pE=p.interviewEnd
  const first=new Date(y,m,1).getDay()
  const dim=new Date(y,m+1,0).getDate()
  const prevY=m===0?y-1:y, prevM=m===0?11:m-1
  const nextY=m===11?y+1:y, nextM=m===11?0:m+1
  const cells=[...Array(first).fill(null),...Array.from({length:dim},(_,i)=>i+1)]
  while(cells.length%7)cells.push(null)
  
  return`<div class="cal">
    <div class="cal-hd">
      <button class="cal-nav" onclick="calNav('${id}',${prevY},${prevM})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></button>
      <div class="cal-mo">${y}년 ${MONTHS[m]}</div>
      <button class="cal-nav" onclick="calNav('${id}',${nextY},${nextM})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></button>
    </div>
    <div class="cal-body">
      <div class="cal-wk">${WEEKDAYS.map((w,i)=>`<div class="cal-wh" style="color:${i===0?'var(--danger)':i===6?'var(--primary)':'var(--gray-500)'}">${w}</div>`).join('')}</div>
      <div class="cal-grid">${cells.map((d,i)=>{
        if(!d)return`<div class="cal-d empty"></div>`
        const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
        const inP = (ds>=pS && ds<=pE)
        const isSel=sel.includes(ds), isHi=hi.includes(ds)
        let cls='cal-d'
        if(!inP && !isHi) cls+=' disabled'
        else if(inP) cls+=' in-period'
        if(isSel) cls+=' sel'
        else if(isHi) cls+=' hi'
        if(i%7===0) cls+=' sun'; if(i%7===6) cls+=' sat'
        
        let onclickAttr = '';
        if(!readonly) {
           if(onClickDate) onclickAttr = `onclick="${onClickDate}('${ds}')"`;
           else if(inP) onclickAttr = `onclick="calToggle('${id}','${ds}')"`;
        }
        return`<div class="${cls}" ${onclickAttr} title="${fmtDate(ds)}">${d}${isHi&&!isSel?`<div style="position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--primary);"></div>`:''}</div>`
      }).join('')}</div>
    </div>
  </div>`
}

function calToggle(id,ds){
  if(id==='co-cal'){
    const co=getCo(S.user.companyId)
    if(!co.dateSlots) co.dateSlots = {}
    const dates=Object.keys(co.dateSlots)
    if(dates.indexOf(ds)===-1){co.dateSlots[ds]=[{start:'10:00',end:'17:00'}]}
    else{delete co.dateSlots[ds]}
  } else if(id.startsWith('st-cal-')){
    const coId=id.replace('st-cal-','')
    const st=getSt(S.user.studentId)
    if(!st.avail[coId])st.avail[coId]=[]
    const i=st.avail[coId].indexOf(ds)
    if(i===-1)st.avail[coId].push(ds)
    else st.avail[coId].splice(i,1)
  }
  render()
}

// Student booking interaction
function selectBookingDate(ds) {
  S.bookingDate = ds;
  render();
}

function bookSlot(coId, date, time) {
  const st = getSt(S.user.studentId);
  if(!st.bookedSlots) st.bookedSlots = {};
  st.bookedSlots[coId] = { date, time };
  showToast(`${fmtDate(date)} ${time} 면접 일정이 예약되었습니다.`);
  S.modal = null;
  render();
}

function changeStudentStatus(stId, coId, val) {
  const st = getSt(stId);
  if(!st.interviewStatus) st.interviewStatus = {};
  st.interviewStatus[coId] = val;
  render();
  
  if (S.user.role === 'company') {
    const apps = DB.students.filter(x => x.apps.includes(coId));
    const allEval = apps.every(x => ['pass', 'fail', 'pre'].includes(x.interviewStatus[coId]));
    const co = getCo(coId);
    if (allEval && !co.evaluationSubmitted) {
      S.modal = { type: 'eval-complete', coId };
      render();
    }
  }
}

function submitEvaluations(coId) {
  const co = getCo(coId);
  co.evaluationSubmitted = true;
  co.status = 'selection_complete';
  S.modal = null;
  showToast('모든 평가 결과가 운영진에게 제출되었습니다.');
  render();
}

function publishAllResults() {
  S.prog.resultsPublished = true;
  showToast('모든 면접자에게 최종 선발 결과가 공개되었습니다.');
  render();
}

  S.user = {...acc}; S.loginErr = '';

// ─── 2. 면접관리 / 타임테이블 등 ─────────────────────────
function runMatching() {
  const matches = [];
  const failed = [];
  const adminTracker = {}; // [date][time] = count (max 3)

  const cos = DB.companies.filter(c => c.submitted && c.status !== 'selection_complete');

  cos.forEach(co => {
    // 💡 변경점: 이제 학생들이 "직접" 슬롯을 선택(예약)했으므로, 
    // Admin의 매칭 로직은 학생들이 'bookedSlots'에 저장한 정보를 기반으로 타임테이블을 확정합니다.
    const apps = DB.students.filter(s => s.apps.includes(co.id) && s.bookedSlots && s.bookedSlots[co.id]);
    
    apps.forEach(st => {
      const b = st.bookedSlots[co.id];
      const d = b.date;
      const time = b.time;

      if(!adminTracker[d]) adminTracker[d] = {};
      const adminCount = adminTracker[d][time] || 0;
      const isOnline = co.mode === 'online';
      
      // 대면은 운영진 모니터링 수 제한 무시
      if ((!isOnline || adminCount < 3)) {
        if (isOnline) adminTracker[d][time] = adminCount + 1;
        
        const videoLink = isOnline ? 'https://meet.intern.kr/room-' + Math.random().toString(36).substr(2, 6) : null;
        const address = !isOnline ? co.address : null;
        
        matches.push({ coId: co.id, coName: co.name, stId: st.id, stName: st.name, date: d, time: time, mode: co.mode, videoLink, address });
        if(!st.interviewStatus) st.interviewStatus = {};
        st.interviewStatus[co.id] = 'wait'; 
      } else {
        // 이미 해당 시간에 온라인 룸 3개가 꽉 찼는데 예약한 경우 (예외 케이스)
        failed.push({ coId: co.id, coName: co.name, stId: st.id, stName: st.name, reason: '동시간대 모니터링 초과' });
      }
    });
    co.status = 'select_done';
  });

  S.matchResults = { matches, failed };
  S.adminSubView = 'timetable';
  S.timetableTab = 'online';
  showToast('등록된 예약 정보를 기반으로 타임테이블이 생성되었습니다.');
  render();
}

function renderTimetableOnline(onlineMatches) {
  if (onlineMatches.length === 0) return `<div class="card"><div class="empty"><div class="empty-t">배정된 비대면 일정이 없습니다.</div></div></div>`;
  const dates = [...new Set(onlineMatches.map(m => m.date))].sort();
  let html = '';

  dates.forEach(d => {
    html += `<div style="font-size:18px; font-weight:800; color:var(--gray-900); margin:var(--sp-6) 0 var(--sp-3) 0;">🗓 ${fmtDate(d)}</div>`;
    html += `<div class="card"><div class="tw"><table>
      <thead>
        <tr><th style="width:100px; text-align:center">진행 시간</th><th>모니터링 룸 1</th><th>모니터링 룸 2</th><th>모니터링 룸 3</th></tr>
      </thead>
      <tbody>`;
    
    const dayMatches = onlineMatches.filter(m => m.date === d);
    const times = [...new Set(dayMatches.map(m => m.time))].sort();

    times.forEach(t => {
      const timeMatches = dayMatches.filter(m => m.time === t);
      html += `<tr><td style="font-weight:700; text-align:center; color:var(--gray-800)">${t}</td>`;
      for(let i=0; i<3; i++) {
         const match = timeMatches[i];
         if(match) {
            html += `<td>
              <div style="font-weight:700; color:var(--gray-900); font-size:14px; margin-bottom:4px">${match.coName}</div>
              <div style="font-size:13px; color:var(--gray-600); margin-bottom:8px">${match.stName} 면접자</div>
              <a href="${match.videoLink}" target="_blank" class="btn btn-outline-blue btn-sm" style="font-size:11px; height:26px">화상 링크 연결</a>
            </td>`;
         } else {
            html += `<td><span style="color:var(--gray-400); font-size:13px">- 일정 없음 -</span></td>`;
         }
      }
      html += `</tr>`;
    });
    html += `</tbody></table></div></div>`;
  });
  return html;
}

function renderTimetableOffline(offlineMatches) {
  if (offlineMatches.length === 0) return `<div class="card"><div class="empty"><div class="empty-t">배정된 대면 일정이 없습니다.</div></div></div>`;
  const dates = [...new Set(offlineMatches.map(m => m.date))].sort();
  let html = '';

  dates.forEach(d => {
    html += `<div style="font-size:18px; font-weight:800; color:var(--gray-900); margin:var(--sp-6) 0 var(--sp-3) 0;">🗓 ${fmtDate(d)}</div>`;
    html += `<div class="card"><div class="tw"><table>
      <thead>
        <tr><th style="width:100px; text-align:center">진행 시간</th><th>기업명</th><th>면접자</th><th>현장 주소</th></tr>
      </thead>
      <tbody>`;
    
    const dayMatches = offlineMatches.filter(m => m.date === d);
    dayMatches.sort((a,b) => t2m(a.time) - t2m(b.time)).forEach(m => {
      html += `<tr>
        <td style="font-weight:700; text-align:center; color:var(--gray-800)">${m.time}</td>
        <td style="font-weight:700; color:var(--gray-900)">${m.coName}</td>
        <td style="font-weight:500; color:var(--gray-700)">${m.stName}</td>
        <td style="color:var(--gray-600); font-size:13px">${m.address || '주소 정보 없음'}</td>
      </tr>`;
    });
    html += `</tbody></table></div></div>`;
  });
  return html;
}

function renderApplicantCard(s, coId, co) {
  const isBooked = s.bookedSlots && s.bookedSlots[coId];
  const statusMapAdmin = { 'wait': '면접 예정', 'eval_needed': '평가 필요', 'fail': '불합격', 'pre': '예비합격', 'pass': '최종합격' };
  const stStatus = (s.interviewStatus && s.interviewStatus[coId]) ? s.interviewStatus[coId] : 'wait';
  
  let matchText = '예약 대기중'; 
  let vLink = '';
  
  if (isBooked) {
    matchText = `${fmtShort(isBooked.date)} ${isBooked.time}`;
  }
  
  // If matched via Admin, admin overrides or confirms
  if(S.matchResults && S.matchResults.matches) {
    const match = S.matchResults.matches.find(m => m.stId === s.id && m.coId === coId);
    if(match) {
        matchText = `${fmtShort(match.date)} ${match.time}`;
        vLink = match.videoLink || '';
    }
  }
  
  const hasReport = s.reports && s.reports[coId];

  let statusUI = '';
  if (S.user.role === 'company') {
      if (stStatus === 'wait') {
          statusUI = `<button class="badge b-gray" style="cursor:pointer; border:1px solid var(--gray-300)" onclick="event.stopPropagation(); changeStudentStatus('${s.id}', '${coId}', 'eval_needed')">대기중 (클릭시 평가모드)</button>`;

             <option value="pass" ${stStatus==='pass'?'selected':''}>최종합격 (Pass)</option>

      }

      statusUI = `<span class="badge ${stStatus==='pass'?'b-purple':stStatus==='wait'?'b-green':stStatus==='eval_needed'?'b-orange':'b-red'}">${statusMapAdmin[stStatus] || statusMapAdmin['wait']}</span>`;

function openStudentBookingModal(coId) {
  S.bookingCoId = coId;
  S.bookingDate = null;
  S.modal = { type: 'st-booking' };
  render();
}

function renderStudentBookingModal() {
  const coId = S.bookingCoId;
  const co = getCo(coId);
  const p = S.prog || PROGRAMS[0];
  const dates = Object.keys(co.dateSlots || {}).sort();
  
  // 예약 가능 슬롯 렌더링 로직
  let slotsHtml = `<div class="empty" style="padding:var(--sp-8)"><div class="empty-ico">📅</div><div class="empty-t">좌측에서 날짜를 선택하세요</div></div>`;
  
  if (S.bookingDate) {
    const daySlots = co.dateSlots[S.bookingDate] || [];
    const slotMin = co.slotMinutes || p.slotMinutes || 30;
    const capacity = co.type === '1on1' ? 1 : (co.groupSize || 5);
    
    let intervals = [];
    daySlots.forEach(ds => {
      intervals = intervals.concat(generateIntervals(ds.start, ds.end, slotMin));
    });
    
    intervals.sort();
    
    if(intervals.length === 0) {
      slotsHtml = `<div class="empty">선택한 날짜에 생성된 슬롯이 없습니다.</div>`;
    } else {
      slotsHtml = `<div style="display:flex; flex-direction:column; gap:var(--sp-2)">`;
      intervals.forEach(time => {
        // 예약 현황 계산
        const bookedCount = DB.students.filter(s => s.bookedSlots && s.bookedSlots[coId] && s.bookedSlots[coId].date === S.bookingDate && s.bookedSlots[coId].time === time).length;
        const isFull = bookedCount >= capacity;
        const isMyBooking = S.user.role === 'student' && getSt(S.user.studentId).bookedSlots?.[coId]?.date === S.bookingDate && getSt(S.user.studentId).bookedSlots?.[coId]?.time === time;
        
        slotsHtml += `
          <button class="slot-btn ${isMyBooking ? 'sel' : (isFull ? 'disabled' : '')}" ${isFull && !isMyBooking ? 'disabled' : ''} onclick="${isMyBooking ? '' : `bookSlot('${coId}', '${S.bookingDate}', '${time}')`}">
            <div style="font-weight:700; font-size:15px">${time}</div>
            <div class="flex aic gap-3">
              <span style="font-size:13px; color:var(--gray-500)">${isMyBooking ? '나의 예약' : (isFull ? '예약 마감' : '예약 가능')}</span>
              <span class="badge ${isFull ? 'b-gray' : 'b-blue'}">${bookedCount} / ${capacity}</span>
            </div>
          </button>
        `;
      });
      slotsHtml += `</div>`;
    }
  }

  return `
    <div class="ov" onmousedown="if(event.target===this){S.modal=null;render()}">
      <div class="modal m-huge">
        <button class="mcl" onclick="S.modal=null;render()">×</button>
        <div class="mh">
          <div class="mt">${co.name} 면접 일정 예약</div>
          <div style="font-size:13px; color:var(--gray-500); margin-top:4px">원하는 일정을 선착순으로 예약합니다. 면접 형태: ${typeLbl(co.type)} (최대 ${co.type==='1on1'?1:co.groupSize}명)</div>
        </div>
        <div class="mb-scroll flex gap-6">
          <div style="width:360px; flex-shrink:0;">
            <div style="font-size:14px; font-weight:700; color:var(--gray-900); margin-bottom:12px">1. 날짜 선택</div>
            ${renderCal({id:'st-booking-cal', sel:S.bookingDate ? [S.bookingDate] : [], hi:dates, readonly:false, onClickDate: 'selectBookingDate'})}
          </div>
          <div style="flex:1; border-left:1px solid var(--gray-200); padding-left:var(--sp-6)">
            <div class="flex jb aic mb-4">
              <div style="font-size:14px; font-weight:700; color:var(--gray-900);">2. 시간 선택</div>
              ${S.bookingDate ? `<div style="font-size:14px; font-weight:800; color:var(--primary)">${fmtDate(S.bookingDate)}</div>` : ''}
            </div>
            ${slotsHtml}
          </div>
        </div>
      </div>
    </div>
  `;
}

           <div class="cb" style="font-size:14px; line-height:1.8; color:var(--gray-800); white-space:pre-wrap;">${report.aiEvaluation}</div>
        </div>
     </div>
  </div>
  `;
}

function handleGroupSizeChange(val) {
    const co = getCo(S.user.companyId);
    if (val === 'custom') {
       if (co.groupSize <= 5) co.groupSize = 6;
    } else {
       co.groupSize = parseInt(val, 10);
    }
    render();
}

// ═══════════════════════════════════════════
// STUDENT VIEW
// ═══════════════════════════════════════════
const ST_NAV=[
  {id:'st-notice',label:'공지사항',ico:'<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'},
  {id:'st-status',label:'나의 대시보드',ico:'<path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a1 1 0 0 0-1 1v0a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v0a1 1 0 0 0-1-1H9z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>'},
  {id:'st-dates',label:'스케줄 설정',ico:'<rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/><line x1="16" y1="2" x2="16" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="2" x2="8" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="2"/>'},
  {id:'st-inquiry',label:'문의하기',ico:'<path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'}
]

function renderStudent(){
  const st=getSt(S.user.studentId)
  const sidebar=`
  <div style="padding:var(--sp-4) var(--sp-2) var(--sp-4); margin-bottom:var(--sp-4); border-bottom:1px solid var(--gray-200)">
    <div class="flex aic gap-3">
      <div class="avatar" style="width:48px;height:48px;font-size:18px">${st.name[0]}</div>
      <div><div style="font-size:16px;font-weight:800;color:var(--gray-900)">${st.name}</div><div style="font-size:12px;color:var(--gray-500);margin-top:2px">${st.school||'-'}</div></div>
    </div>
  </div>
  <div class="nav-section">
    <div class="nav-label">지원자 메뉴</div>
    ${ST_NAV.map(n=>`<div class="nav-item ${S.tab===n.id?'active':''}" onclick="S.tab='${n.id}';S.noticeView='list';S.inquiryView='list';render()">
      <svg class="ni-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${n.ico}</svg>${n.label}
    </div>`).join('')}
  </div>`
  let main=''
  if(S.tab==='st-notice') {
      if(S.noticeView === 'detail') main = renderNoticeDetail();
      else main = renderNoticeList();
  }
  else if(S.tab==='st-status') main=renderStStatus()
  else if(S.tab==='st-dates') main=renderStDates()
  else if(S.tab==='st-inquiry') main=renderStInquiry()
  return renderShell(sidebar,main)
}

function renderStStatus(){
  const st=getSt(S.user.studentId)
  const p=S.prog||PROGRAMS[0]
  
  return`<div>
  <div class="ph"><div class="ph-t">지원 파이프라인 현황</div><div class="ph-s">${p.name}에 연결된 지원 상태입니다.</div></div>
  <div class="card mb-6" style="background:var(--primary); border:none; padding:var(--sp-8) var(--sp-6)">
    <div style="font-size:24px; font-weight:800; color:#fff; letter-spacing:-0.02em">${p.name}</div>
    <div style="font-size:14px; color:var(--primary-light); margin-top:var(--sp-2)">오픈된 평가 풀 기간: ${fmtDate(p.interviewStart)} ~ ${fmtDate(p.interviewEnd)}</div>
    <div class="flex gap-2 mt-4"><span class="badge" style="background:rgba(255,255,255,0.2); color:#fff; border:none; font-size:13px; padding:6px 12px">타임라인 픽스 데드라인: ${fmtDate(p.studentDeadline)}</span></div>
  </div>
  
  <div style="display:flex; flex-direction:column; gap:var(--sp-4)">
  ${st.apps.map(cid=>{
    const co=getCo(cid)
    const b = st.bookedSlots && st.bookedSlots[cid];
    const isPublished = p.resultsPublished;
    const finalStatus = st.interviewStatus && st.interviewStatus[cid];

    let rightArea = '';
    
    if (isPublished && finalStatus && finalStatus !== 'wait' && finalStatus !== 'eval_needed') {
        const sm = {'pass':'최종합격', 'pre':'예비합격', 'fail':'불합격'};
        const sc = {'pass':'var(--primary)', 'pre':'var(--warning)', 'fail':'var(--danger)'};
        rightArea = `<div style="text-align:right">
            <div style="font-size:13px; color:var(--gray-500); font-weight:600; margin-bottom:4px">최종 선발 결과</div>
            <div style="font-size:20px; font-weight:900; color:${sc[finalStatus]}">${sm[finalStatus]}</div>
        </div>`;
    } 
    else if (b) {
        rightArea = `<div style="text-align:right">
            <div style="font-size:12px; color:var(--success); font-weight:700; margin-bottom:4px">예약 확정됨</div>
            <div style="font-size:16px; font-weight:800; color:var(--gray-900)">${fmtShort(b.date)} ${b.time}</div>
        </div>`;
    } else {
        rightArea = `<div style="text-align:right">
            <div style="font-size:12px; color:var(--warning); font-weight:700; margin-bottom:8px">일정 선택 대기중</div>
            <button class="btn btn-primary btn-sm" onclick="openStudentBookingModal('${cid}')">면접 일정 선택</button>
        </div>`;
    }

    return`<div class="card" style="display:flex; align-items:center; gap:var(--sp-4); padding:var(--sp-4) var(--sp-6)">
      <div class="avatar" style="width:48px;height:48px;background:var(--gray-100);color:var(--gray-500);font-size:20px">🏢</div>
      <div style="flex:1">
         <div style="font-size:16px;font-weight:700;color:var(--gray-900)">${co.name} 평가 프로세스</div>
         <div style="font-size:13px;color:var(--gray-500);margin-top:4px">할당 상태 체크 완료</div>
      </div>
      <div style="text-align:right; margin-right:var(--sp-6)">
         <div style="font-size:12px;color:var(--gray-500); font-weight:600">바인딩 된 날짜</div>
         <div style="font-size:18px;font-weight:800;color:${(st.avail[cid]||[]).length>0?'var(--primary)':'var(--warning)'}">${(st.avail[cid]||[]).length}개 노드</div>
      </div>
      ${rightArea}
    </div>`
  }).join('')}
  </div>
  <div style="margin-top:var(--sp-8); text-align:right">
     <button class="btn btn-primary btn-lg" onclick="S.tab='st-dates';render()">가용 일정 동기화 설정 →</button>
  </div>
  </div>`
}

function renderStDates(){
  const st=getSt(S.user.studentId)
  if(!st.apps || st.apps.length===0) return `<div class="card"><div class="empty">연결된 파이프라인이 존재하지 않습니다.</div></div>`
  if(!S.activeStCo) S.activeStCo=st.apps[0]
  const coid=S.activeStCo
  const co=getCo(coid)
  const myD=st.avail[coid]||[]
  const hi=co.dateSlots ? Object.keys(co.dateSlots) : []
  
  return`<div>
  <div class="ph"><div class="ph-t">타임 스케줄러</div><div class="ph-s">우측 캘린더에서 파란색 점이 찍힌 오픈 노드를 클릭하여 본인의 가용 대역을 마킹하세요.</div></div>
  <div class="seg mb-6">
    ${st.apps.map(cid=>{
      const co2=getCo(cid),cnt=(st.avail[cid]||[]).length
      return`<button class="seg-btn ${coid===cid?'on':''}" onclick="S.activeStCo='${cid}';render()">${co2.name} 큐 (${cnt}개)</button>`
    }).join('')}
  </div>
  <div style="display:grid;grid-template-columns:360px 1fr;gap:var(--sp-6);align-items:start">
    <div>${renderCal({id:`st-cal-${coid}`,sel:myD,hi})}</div>
    <div>
      <div class="card" style="box-shadow:var(--shadow-md)">
        <div class="ch" style="background:var(--gray-50)"><div class="ct">할당된 가용 노드 리뷰 (${myD.length} Points)</div></div>
        <div class="cb" style="min-height:200px">
          ${myD.length===0?`<div class="empty" style="padding:var(--sp-8) 0"><div class="empty-ico">📍</div><div class="empty-t">플로팅 데이터 없음</div><div class="empty-s">좌측 인터페이스를 사용하여 노드를 생성하십시오.</div></div>`:`<div class="flex gap-2 flex-wrap">${myD.sort().map(d=>`<div class="badge b-blue" style="font-size:14px; padding:8px 16px; border:1px solid var(--primary-border)">${fmtDate(d)}<span style="cursor:pointer; margin-left:8px; opacity:0.6" onclick="calToggle('st-cal-${coid}','${d}')">✕</span></div>`).join('')}</div>`}
        </div>
        <div style="padding:var(--sp-4) var(--sp-6); border-top:1px solid var(--gray-200); background:var(--gray-50)">
           <button class="btn btn-primary btn-lg w-full" onclick="showToast('스케줄 정보가 엔진에 컴밋되었습니다.');render()" ${myD.length===0?'disabled':''}>시스템에 스케줄 동기화 확정</button>
        </div>
      </div>
    </div>
  </div></div>`
}

function renderStInquiry() {
  if (S.inquiryView === 'detail') {
    const inq = DB.inquiries.find(x => x.id === S.selectedInquiryId);
    return `<div>
      <div class="ph flex jb aic"><div><div class="ph-t">나의 문의 상세</div></div><button class="btn btn-secondary" onclick="S.inquiryView='list';render()">이전으로</button></div>
      <div class="card mb-6" style="max-width:800px">
        <div class="cb">
          <div class="flex jb aic mb-4"><span class="badge ${inq.status==='answered'?'b-green':'b-orange'}">${inq.status==='answered'?'답변완료':'답변대기'}</span><span style="font-size:13px; color:var(--gray-500); font-weight:600">${inq.date}</span></div>
          <div style="font-size:22px; font-weight:800; margin-bottom:var(--sp-4); color:var(--gray-900)">${inq.title}</div>
          <div style="font-size:15px; line-height:1.7; color:var(--gray-800); padding:var(--sp-4); background:var(--gray-50); border:1px solid var(--gray-200); border-radius:var(--radius-md)">${inq.content}</div>
        </div>
      </div>
      ${inq.status === 'answered' ? `<div class="card" style="max-width:800px"><div class="ch" style="background:var(--primary-light); border-bottom:1px solid var(--primary-border)"><div class="ct" style="color:var(--primary)">관리자 회신 내용</div></div><div class="cb"><div style="font-size:13px; color:var(--gray-500); font-weight:600; margin-bottom:var(--sp-2)">회신 시각: ${inq.replyDate}</div><div style="font-size:15px; line-height:1.7; color:var(--gray-900); white-space:pre-wrap">${inq.reply}</div></div></div>` : ''}
    </div>`;
  }
  const myInqs = DB.inquiries.filter(i => i.authorId === S.user.studentId);
  return `<div>
    <div class="ph flex jb aic"><div><div class="ph-t">문의하기</div><div class="ph-s">운영진에게 궁금한 사항을 남겨주세요.</div></div><button class="btn btn-primary" onclick="S.modal={type:'st-write-inquiry'};render()">+ 문의 작성</button></div>
    <div class="card">
      <div class="tw">
        <table>
          <thead><tr><th style="width:80px; text-align:center">상태</th><th>제목</th><th style="width:120px">등록일</th></tr></thead>
          <tbody>
            ${myInqs.length===0 ? `<tr><td colspan="3" class="empty">등록된 문의가 없습니다.</td></tr>` : ''}
            ${[...myInqs].reverse().map(q => `<tr class="clickable" onclick="S.selectedInquiryId=${q.id}; S.inquiryView='detail'; render()"><td style="text-align:center"><span class="badge ${q.status==='answered'?'b-gray':'b-orange'}">${q.status==='answered'?'답변완료':'답변대기'}</span></td><td style="font-weight:600; color:var(--gray-800)">${q.title}</td><td style="color:var(--gray-500)">${q.date}</td></tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;
}

function submitStInquiry() {
  const title = document.getElementById('inq-w-title').value.trim();
  const content = document.getElementById('inq-w-content').value.trim();
  if(!title || !content) return alert('제목과 내용을 모두 입력해주세요.');

  const newId = DB.inquiries.length > 0 ? Math.max(...DB.inquiries.map(i=>i.id)) + 1 : 1;
  DB.inquiries.push({
    id: newId, authorId: S.user.studentId, role: 'student', title: title, content: content,
    date: fmtDate(new Date().toISOString().split('T')[0]),
    status: 'waiting', reply: '', replyDate: ''
  });
  
  showToast('문의가 등록되었습니다.');
  S.modal = null; S.inquiryView = 'list'; render();
}

// ═══════════════════════════════════════════
// INITIAL RENDER & MODAL WRAPPER
// ═══════════════════════════════════════════
function render(){
  const app=document.getElementById('app')
  if(S.view==='login') app.innerHTML=renderLogin()
  else if(S.view==='prog-select') app.innerHTML=renderProgSelectView()
  else if(S.view==='admin') app.innerHTML=renderAdmin()
  else if(S.view==='company') app.innerHTML=renderCompany()
  else if(S.view==='student') app.innerHTML=renderStudent()
  
  if(S.view==='login'){
     const em=document.querySelector('input[type="email"]'); const pw=document.querySelector('input[type="password"]');
     if(em)em.value=S.loginEmail; if(pw)pw.value=S.loginPw;
  }
  
  if(S.modal && (S.modal.type === 'co-write-inquiry' || S.modal.type === 'st-write-inquiry')) {
     document.body.insertAdjacentHTML('beforeend', renderModalWrapper());
  }

  if((S.view==='admin' || S.view==='company') && S.tab==='settings') {
     setTimeout(() => {
        const el = document.getElementById("set-interview-range");
        if(el) {
          flatpickr(el, {
             mode: "range", locale: "ko", dateFormat: "Y-m-d", minDate: "today",
             defaultDate: (S.prog && S.prog.interviewStart && S.prog.interviewEnd) ? [S.prog.interviewStart, S.prog.interviewEnd] : null,
             locale: { rangeSeparator: " ~ " }
          });
        }
     }, 0);
  }
}

const _render = render;
render = function() {
    const overlays = document.querySelectorAll('.ov');
    overlays.forEach(o => { if(!o.closest('#app')) o.remove(); }); 
    _render();
}

render()
</script>
