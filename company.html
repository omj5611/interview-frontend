<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기업 | 면접 일정 자동 매칭 시스템</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F8FA;--card:#fff;--card2:#F2F4F6;--border:#E5E8EB;--border2:#D1D5DB;
  --blue:#3182F6;--blue2:rgba(49,130,246,0.08);--blue3:rgba(49,130,246,0.15);
  --t1:#191919;--t2:#6B7280;--t3:#B0B8C1;--t4:#E5E8EB;
  --green:#17C964;--green2:rgba(23,201,100,0.1);
  --red:#E85C5C;--red2:rgba(232,92,92,0.1);
  --orange:#F59E0B;--orange2:rgba(245,158,11,0.1);
  --purple:#7C3AED;--purple2:rgba(124,58,237,0.1);
  --shadow:0 1px 4px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.04);
  --shadow2:0 2px 8px rgba(0,0,0,0.08),0 8px 32px rgba(0,0,0,0.06);
  --r:8px;--r2:12px;--r3:16px;
  --font:'Pretendard Variable','Pretendard','Noto Sans KR',-apple-system,sans-serif
}
body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100vh;font-size:14px;line-height:1.5}
input,textarea,select,button{font-family:var(--font)}
button{cursor:pointer;border:none;background:none}
a{text-decoration:none}

.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{height:56px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.topbar-logo{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:800;letter-spacing:-0.4px;color:var(--t1)}
.topbar-logo .dot{color:var(--blue)}
.layout{display:flex;flex:1}
.sidebar{width:220px;background:var(--card);border-right:1px solid var(--border);padding:16px 12px;flex-shrink:0;min-height:calc(100vh - 56px);position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.main{flex:1;padding:28px 32px;min-width:0}

.nav-group{margin-bottom:20px}
.nav-group-label{font-size:10.5px;font-weight:700;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;padding:0 8px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;transition:all .12s;border:1px solid transparent}
.nav-item:hover{background:var(--card2);color:var(--t1)}
.nav-item.active{background:var(--blue2);color:var(--blue);font-weight:700;border-color:rgba(49,130,246,.15)}
.nav-item svg{flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);box-shadow:var(--shadow);overflow:hidden}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:15px;font-weight:700;color:var(--t1)}
.card-body{padding:20px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}

.btn{display:inline-flex;align-items:center;gap:6px;padding:0 14px;height:36px;border-radius:var(--r);font-size:13px;font-weight:600;transition:all .12s;cursor:pointer;border:none;flex-shrink:0}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#2570e5}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--card2);color:var(--t1)}
.btn-sm{height:28px;padding:0 10px;font-size:12px}
.btn-lg{height:44px;padding:0 20px;font-size:14px;font-weight:700}

.form-group{margin-bottom:16px}
.form-label{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:5px;display:block}
.form-input{width:100%;height:40px;padding:0 12px;border:1.5px solid var(--border);border-radius:var(--r);font-size:13px;color:var(--t1);background:var(--card2);outline:none;transition:border .15s}
.form-input:focus{border-color:var(--blue);background:var(--card)}

.segment{display:flex;border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--card2)}
.segment-btn{flex:1;height:36px;font-size:13px;font-weight:500;color:var(--t2);background:transparent;border:none;cursor:pointer;transition:all .12s}
.segment-btn.active{background:var(--blue);color:#fff;font-weight:700}

.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:11.5px;font-weight:600;flex-shrink:0}
.badge-blue{background:var(--blue2);color:var(--blue);border:1px solid rgba(49,130,246,.2)}
.badge-green{background:var(--green2);color:#0ea05a;border:1px solid rgba(23,201,100,.2)}
.badge-red{background:var(--red2);color:var(--red);border:1px solid rgba(232,92,92,.2)}
.badge-orange{background:var(--orange2);color:#d97706;border:1px solid rgba(245,158,11,.2)}
.badge-gray{background:var(--card2);color:var(--t2);border:1px solid var(--border)}
.badge-purple{background:var(--purple2);color:var(--purple);border:1px solid rgba(124,58,237,.2)}

.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:11.5px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;padding:10px 14px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
td{font-size:13px;color:var(--t1);padding:12px 14px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}

.cal-wrap{border:1.5px solid var(--border);border-radius:var(--r2);overflow:hidden;background:var(--card)}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);background:var(--card2)}
.cal-month{font-size:14px;font-weight:700;color:var(--t1)}
.cal-nav{width:28px;height:28px;border-radius:var(--r);border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);transition:all .12s}
.cal-nav:hover{background:var(--blue2);border-color:var(--blue);color:var(--blue)}
.cal-grid{padding:12px}
.cal-days-header{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.cal-day-header{text-align:center;font-size:11px;font-weight:600;color:var(--t3);padding:4px 0}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:12.5px;border-radius:var(--r);cursor:pointer;transition:all .12s;border:1.5px solid transparent;position:relative;font-weight:400;color:var(--t1)}
.cal-day.empty{pointer-events:none}
.cal-day.in-period{background:rgba(49,130,246,.05)}
.cal-day.selectable:hover{background:var(--blue2);border-color:var(--blue);color:var(--blue)}
.cal-day.selected{background:var(--blue);color:#fff;font-weight:700;border-color:var(--blue)}
.cal-day.selected:hover{background:#2570e5}
.cal-day.disabled{opacity:.3;pointer-events:none}
.cal-day.sunday{color:#ef4444}
.cal-day.saturday{color:var(--blue)}
.cal-day.selected.sunday,.cal-day.selected.saturday{color:#fff}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border-radius:var(--r3);box-shadow:0 20px 60px rgba(0,0,0,.15);width:100%;max-height:90vh;overflow-y:auto;position:relative}
.modal-xl{max-width:900px}
.modal-close{position:absolute;top:16px;right:16px;width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--card2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--t3);transition:all .12s;z-index:10}
.modal-close:hover{background:var(--red2);color:var(--red);border-color:var(--red)}
.modal-header{padding:24px 24px 16px}
.modal-title{font-size:18px;font-weight:800;color:var(--t1);letter-spacing:-.3px}
.modal-subtitle{font-size:13px;color:var(--t3);margin-top:3px}
.modal-body{padding:0 24px 24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

.info-row{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-key{font-size:12px;font-weight:600;color:var(--t3);min-width:110px;padding-top:1px;flex-shrink:0}
.info-val{font-size:13px;color:var(--t1);flex:1;line-height:1.5}
.info-val a{color:var(--blue);text-decoration:underline}
.info-section{background:var(--card2);border-radius:var(--r);padding:12px 14px;margin-bottom:12px}

.applicant-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:16px;cursor:pointer;transition:all .15s}
.applicant-card:hover{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue2)}
.applicant-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#3182F6,#6366f1);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0}
.applicant-name{font-size:14px;font-weight:700;color:var(--t1)}
.applicant-meta{font-size:12px;color:var(--t3);margin-top:2px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--t1);color:#fff;padding:10px 20px;border-radius:var(--r2);font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.2);display:flex;align-items:center;gap:8px;animation:toastIn .3s ease;white-space:nowrap}
.toast.error{background:var(--red)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.page-header{margin-bottom:24px}
.page-title{font-size:22px;font-weight:900;color:var(--t1);letter-spacing:-.5px}
.page-subtitle{font-size:13.5px;color:var(--t3);margin-top:4px}
.empty{text-align:center;padding:48px 24px;color:var(--t3)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-text{font-size:14px;font-weight:600;color:var(--t2)}
.empty-sub{font-size:12.5px;color:var(--t3);margin-top:4px}

.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}
.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.mt-4{margin-top:16px}
.mb-4{margin-bottom:16px}
.w-full{width:100%}
.divider{height:1px;background:var(--border);margin:16px 0}
.chip-tag{display:inline-flex;align-items:center;padding:3px 8px;border-radius:999px;font-size:11.5px;font-weight:600;background:var(--card2);color:var(--t2);border:1px solid var(--border)}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--t3)}
</style>
</head>
<body>
<div id="app"></div>

<script>
const S = {
  tab: 'co-settings',
  modal: null,
  toast: null
}

function getDB() {
  return JSON.parse(localStorage.getItem('interviewMatchingDB') || '{}')
}
function saveDB(db) {
  localStorage.setItem('interviewMatchingDB', JSON.stringify(db))
}
function getUser() {
  return JSON.parse(localStorage.getItem('interviewMatchingUser') || 'null')
}
function requireCompany() {
  const user = getUser()
  if (!user || user.role !== 'company') {
    alert('기업 계정만 접근할 수 있습니다.')
    location.href = 'index.html'
    return null
  }
  return user
}

const user = requireCompany()
if (!user) {}

let DB = getDB()

function getCompany(id) { return DB.companies.find(c=>c.id===id) }
function getStudent(id) { return DB.students.find(s=>s.id===id) }

const WEEKDAYS = ['일','월','화','수','목','금','토']
const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월']
const CAL_STATE = {}

function fmtDate(d) {
  if (!d) return ''
  const dt = new Date(d + 'T00:00:00')
  return `${dt.getMonth()+1}월 ${dt.getDate()}일(${WEEKDAYS[dt.getDay()]})`
}
function fmtDateShort(d) {
  if (!d) return ''
  const dt = new Date(d + 'T00:00:00')
  return `${dt.getMonth()+1}/${dt.getDate()}`
}
function modeName(m) { return m === 'online' ? '비대면(화상)' : '대면' }
function typeName(t) { return t === '1on1' ? '1:1 면접' : '그룹 면접' }
function modeColor(m) { return m === 'online' ? 'badge-blue' : 'badge-green' }
function typeColor(t) { return t === '1on1' ? 'badge-purple' : 'badge-orange' }

function showToast(msg, type='ok') {
  S.toast = { msg, type }
  render()
  setTimeout(() => {
    S.toast = null
    render()
  }, 2800)
}

function doLogout() {
  localStorage.removeItem('interviewMatchingUser')
  location.href = 'index.html'
}
function setTab(tab) {
  S.tab = tab
  render()
}

function timeToMin(t) {
  const [h,m] = t.split(':').map(Number)
  return h*60 + m
}

function getCalState(id) {
  if (!CAL_STATE[id]) CAL_STATE[id] = { year:2025, month:7 }
  return CAL_STATE[id]
}

function calNav(y, m, id) {
  CAL_STATE[id] = { year:y, month:m }
  render()
}

function calToggle(id, dateStr) {
  const co = getCompany(user.companyId)
  const idx = co.availDates.indexOf(dateStr)
  if (idx === -1) co.availDates.push(dateStr)
  else co.availDates.splice(idx, 1)
  saveDB(DB)
  render()
}

function renderCalendar({ id, selected=[], year, month }) {
  const first = new Date(year, month, 1).getDay()
  const daysInMonth = new Date(year, month+1, 0).getDate()
  const prog = DB.program
  const pStart = prog.interviewStart
  const pEnd = prog.interviewEnd

  const cells = [...Array(first).fill(null), ...Array.from({length:daysInMonth},(_,i)=>i+1)]
  while (cells.length % 7 !== 0) cells.push(null)

  const prevM = month === 0 ? 11 : month - 1
  const prevY = month === 0 ? year - 1 : year
  const nextM = month === 11 ? 0 : month + 1
  const nextY = month === 11 ? year + 1 : year

  return `
  <div class="cal-wrap">
    <div class="cal-header">
      <button class="cal-nav" onclick="calNav(${prevY},${prevM},'${id}')">‹</button>
      <div class="cal-month">${year}년 ${MONTHS[month]}</div>
      <button class="cal-nav" onclick="calNav(${nextY},${nextM},'${id}')">›</button>
    </div>
    <div class="cal-grid">
      <div class="cal-days-header">
        ${WEEKDAYS.map((d,i)=>`<div class="cal-day-header" style="color:${i===0?'#ef4444':i===6?'var(--blue)':'var(--t3)'}">${d}</div>`).join('')}
      </div>
      <div class="cal-days">
        ${cells.map((d,i)=>{
          if (!d) return `<div class="cal-day empty"></div>`
          const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
          const isSelected = selected.includes(dateStr)
          const inPeriod = dateStr >= pStart && dateStr <= pEnd
          const dow = i % 7
          let cls = 'cal-day'
          if (!inPeriod) cls += ' disabled'
          else cls += ' selectable in-period'
          if (isSelected) cls += ' selected'
          if (dow === 0) cls += ' sunday'
          if (dow === 6) cls += ' saturday'
          return `<div class="${cls}" ${inPeriod?`onclick="calToggle('${id}','${dateStr}')"`:''}>${d}</div>`
        }).join('')}
      </div>
    </div>
  </div>`
}

function renderApp(sidebar, main) {
  const co = getCompany(user.companyId)
  return `
  <div class="app">
    <div class="topbar">
      <div class="topbar-logo">
        <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" fill="var(--blue)"/>
          <path d="M7 9h8M7 14h14M7 19h10" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
        면접 매칭<span class="dot">.</span>
      </div>
      <div style="flex:1"></div>
      <span style="font-size:13px;font-weight:700;color:var(--t1)">${co.name}</span>
      <span class="badge badge-green">기업</span>
      <div style="width:1px;height:20px;background:var(--border);margin:0 4px"></div>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">로그아웃</button>
    </div>
    <div class="layout">
      <div class="sidebar">${sidebar}</div>
      <div class="main">${main}</div>
    </div>
  </div>
  ${S.modal ? renderModal() : ''}
  ${S.toast ? `<div class="toast ${S.toast.type==='error'?'error':''}">${S.toast.type==='error'?'✗':'✓'} ${S.toast.msg}</div>` : ''}
  `
}

function renderCompany() {
  const co = getCompany(user.companyId)
  const navItems = [
    ['co-settings','면접 설정','<path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" stroke="currentColor" stroke-width="1.8"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke="currentColor" stroke-width="1.8"/>'],
    ['co-dates','가능 날짜','<rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.8"/><line x1="16" y1="2" x2="16" y2="6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="8" y1="2" x2="8" y2="6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="1.8"/>'],
    ['co-applicants','지원자 목록','<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>'],
    ['co-schedule','확정 일정','<path d="M9 11l3 3L22 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>']
  ]

  const sidebar = `
  <div style="padding:14px 8px 12px;margin-bottom:8px;border-bottom:1px solid var(--border)">
    <div style="font-size:13.5px;font-weight:800;color:var(--t1)">${co.name}</div>
    <div style="font-size:11.5px;color:var(--t3);margin-top:2px">${co.industry}</div>
    <div style="margin-top:8px;display:flex;gap:4px;flex-wrap:wrap">
      <span class="badge ${modeColor(co.mode)}">${modeName(co.mode)}</span>
      <span class="badge ${typeColor(co.type)}">${typeName(co.type)}</span>
    </div>
  </div>
  <div class="nav-group">
    <div class="nav-group-label">기업 메뉴</div>
    ${navItems.map(([id,label,path])=>`
      <div class="nav-item ${S.tab===id?'active':''}" onclick="setTab('${id}')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none">${path}</svg>
        ${label}
      </div>
    `).join('')}
  </div>`

  let main = ''
  if (S.tab === 'co-settings') main = renderCoSettings()
  else if (S.tab === 'co-dates') main = renderCoDates()
  else if (S.tab === 'co-applicants') main = renderCoApplicants()
  else if (S.tab === 'co-schedule') main = renderCoSchedule()

  return renderApp(sidebar, main)
}

function renderCoSettings() {
  const co = getCompany(user.companyId)
  return `
  <div class="page-header">
    <div class="page-title">면접 설정</div>
    <div class="page-subtitle">면접 방식과 형태를 설정하세요</div>
  </div>

  <div style="max-width:560px">
    <div class="card mb-4">
      <div class="card-header"><div class="card-title">📋 기본 설정</div></div>
      <div class="card-body">
        <div class="form-group">
          <label class="form-label">면접 방식</label>
          <div class="segment" style="max-width:280px">
            <button class="segment-btn ${co.mode==='offline'?'active':''}" onclick="setCoMode('offline')">🏢 대면</button>
            <button class="segment-btn ${co.mode==='online'?'active':''}" onclick="setCoMode('online')">💻 비대면(화상)</button>
          </div>
        </div>

        ${co.mode==='online'?`
        <div class="form-group">
          <label class="form-label">화상 미팅 링크</label>
          <input class="form-input" type="url" value="${co.link}" placeholder="https://meet.google.com/..." oninput="updateCoLink(this.value)">
        </div>`:''}

        <div class="form-group">
          <label class="form-label">면접 형태</label>
          <div class="segment" style="max-width:280px">
            <button class="segment-btn ${co.type==='1on1'?'active':''}" onclick="setCoType('1on1')">👤 1:1 면접</button>
            <button class="segment-btn ${co.type==='group'?'active':''}" onclick="setCoType('group')">👥 그룹 면접</button>
          </div>
        </div>

        ${co.type==='group'?`
        <div class="form-group">
          <label class="form-label">그룹당 최대 인원</label>
          <div style="display:flex;gap:8px;align-items:center">
            ${[2,3,4,5].map(n=>`
              <button onclick="setCoGroupSize(${n})" style="width:44px;height:44px;border-radius:var(--r);border:2px solid ${co.groupSize===n?'var(--blue)':'var(--border)'};background:${co.groupSize===n?'var(--blue2)':'var(--card2)'};font-size:15px;font-weight:800;color:${co.groupSize===n?'var(--blue)':'var(--t2)'}">${n}</button>
            `).join('')}
            <span style="font-size:12.5px;color:var(--t3)">명</span>
          </div>
        </div>`:''}

        <div class="form-group">
          <label class="form-label">면접 가능 시간대</label>
          <div style="display:flex;gap:8px;align-items:center">
            <input class="form-input" type="time" value="${co.timeStart}" oninput="updateCoTime('start',this.value)" style="width:130px">
            <span style="color:var(--t3);font-weight:600">~</span>
            <input class="form-input" type="time" value="${co.timeEnd}" oninput="updateCoTime('end',this.value)" style="width:130px">
          </div>
        </div>
      </div>
    </div>

    <div class="card mb-4">
      <div class="card-header"><div class="card-title">ℹ️ 현재 설정 요약</div></div>
      <div class="card-body">
        <div class="info-section">
          <div class="info-row"><div class="info-key">면접 방식</div><div class="info-val"><span class="badge ${modeColor(co.mode)}">${modeName(co.mode)}</span></div></div>
          ${co.mode==='online'?`<div class="info-row"><div class="info-key">화상 링크</div><div class="info-val"><a href="${co.link}" target="_blank">${co.link||'미입력'}</a></div></div>`:''}
          <div class="info-row"><div class="info-key">면접 형태</div><div class="info-val"><span class="badge ${typeColor(co.type)}">${typeName(co.type)}${co.type==='group'?` (최대 ${co.groupSize}명)`:''}</span></div></div>
          <div class="info-row"><div class="info-key">가능 시간</div><div class="info-val">${co.timeStart} ~ ${co.timeEnd}</div></div>
        </div>
      </div>
    </div>

    <button class="btn btn-primary btn-lg" onclick="saveCoSettings()">설정 저장 완료</button>
  </div>
  `
}

function setCoMode(v) {
  getCompany(user.companyId).mode = v
  saveDB(DB)
  render()
}
function setCoType(v) {
  getCompany(user.companyId).type = v
  saveDB(DB)
  render()
}
function setCoGroupSize(n) {
  getCompany(user.companyId).groupSize = n
  saveDB(DB)
  render()
}
function updateCoLink(v) {
  getCompany(user.companyId).link = v
  saveDB(DB)
}
function updateCoTime(type, value) {
  const co = getCompany(user.companyId)
  if (type === 'start') co.timeStart = value
  else co.timeEnd = value
  saveDB(DB)
  render()
}
function saveCoSettings() {
  getCompany(user.companyId).submitted = true
  saveDB(DB)
  showToast('면접 설정이 저장되었습니다!')
  setTab('co-dates')
}

function renderCoDates() {
  const co = getCompany(user.companyId)
  const cs = getCalState('company-cal')

  return `
  <div class="page-header">
    <div class="page-title">가능 날짜 선택</div>
    <div class="page-subtitle">면접 기간(${fmtDate(DB.program.interviewStart)} ~ ${fmtDate(DB.program.interviewEnd)}) 내에서 가능한 날짜를 선택하세요</div>
  </div>

  <div style="display:grid;grid-template-columns:340px 1fr;gap:24px;align-items:start">
    <div>
      ${renderCalendar({ id:'company-cal', selected:co.availDates, year:cs.year, month:cs.month })}
    </div>

    <div>
      <div class="card">
        <div class="card-header"><div class="card-title">선택된 날짜 (${co.availDates.length}일)</div></div>
        <div class="card-body">
          ${co.availDates.length===0?`
            <div class="empty"><div class="empty-icon">📅</div><div class="empty-text">날짜를 선택해주세요</div></div>
          `:`
            <div style="display:flex;flex-direction:column;gap:6px">
              ${co.availDates.sort().map(d=>`
                <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--blue2);border:1px solid rgba(49,130,246,.2);border-radius:var(--r)">
                  <div>
                    <div style="font-size:13.5px;font-weight:700;color:var(--blue)">${fmtDate(d)}</div>
                    <div style="font-size:11.5px;color:var(--t2);margin-top:2px">${co.timeStart} ~ ${co.timeEnd}</div>
                  </div>
                  <button onclick="calToggle('company-cal','${d}')" style="width:24px;height:24px;border-radius:50%;background:rgba(49,130,246,.15);color:var(--blue);font-size:14px;display:flex;align-items:center;justify-content:center">×</button>
                </div>
              `).join('')}
            </div>
          `}
        </div>
      </div>

      <div style="margin-top:14px">
        <button class="btn btn-primary btn-lg w-full" onclick="submitCoDates()" ${co.availDates.length===0?'disabled':''}>
          날짜 선택 제출하기 (${co.availDates.length}일)
        </button>
      </div>
    </div>
  </div>
  `
}

function submitCoDates() {
  const co = getCompany(user.companyId)
  if (co.availDates.length === 0) return
  co.submitted = true
  saveDB(DB)
  showToast('면접 가능 날짜가 제출되었습니다!')
  setTab('co-applicants')
}

function renderCoApplicants() {
  const co = getCompany(user.companyId)
  const applicants = DB.students.filter(s=>s.apps.includes(co.id))

  return `
  <div class="page-header">
    <div class="page-title">지원자 목록</div>
    <div class="page-subtitle">${co.name} 지원자 ${applicants.length}명</div>
  </div>

  <div class="card-grid">
    ${applicants.map(s=>`
      <div class="applicant-card" onclick="openStudentDetail('${s.id}')">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
          <div class="applicant-avatar">${s.name[0]}</div>
          <div>
            <div class="applicant-name">${s.name}</div>
            <div class="applicant-meta">${s.school} · ${s.dept}</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px;color:var(--t2)">
          <div>📅 신청일: ${s.appDate}</div>
          <div>📚 학력: ${s.edLevel}</div>
          <div>📞 ${s.phone}</div>
          <div>✉️ ${s.email.split('@')[0]}@...</div>
        </div>
        <div class="divider"></div>
        <div style="display:flex;gap:4px;flex-wrap:wrap">
          ${(s.avail[co.id]||[]).map(d=>`<span class="badge badge-blue">${fmtDateShort(d)}</span>`).join('')}
          ${!(s.avail[co.id]||[]).length?`<span class="badge badge-orange">날짜 미선택</span>`:''}
        </div>
      </div>
    `).join('')}
  </div>
  `
}

function renderCoSchedule() {
  const co = getCompany(user.companyId)
  const matchResults = JSON.parse(localStorage.getItem('interviewMatchingResults') || 'null')

  if (!matchResults) {
    return `
    <div class="page-header"><div class="page-title">확정 일정</div></div>
    <div class="empty">
      <div class="empty-icon">⏳</div>
      <div class="empty-text">아직 매칭이 진행되지 않았습니다</div>
      <div class="empty-sub">운영진이 매칭을 실행한 후 확정 일정이 표시됩니다</div>
    </div>`
  }

  const myResults = matchResults.results.filter(r=>r.co.id===co.id)
  const myFailed = matchResults.failed.filter(f=>f.co.id===co.id)

  return `
  <div class="page-header">
    <div class="page-title">확정 면접 일정</div>
    <div class="page-subtitle">총 ${myResults.length}건 매칭 완료</div>
  </div>

  <div class="card mb-4">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>날짜</th><th>시간</th><th>면접자</th><th>유형</th><th>방식</th>${co.mode==='online'?'<th>링크</th>':''}
          </tr>
        </thead>
        <tbody>
          ${myResults.map(r=>`
            <tr>
              <td style="font-weight:700">${fmtDate(r.date)}</td>
              <td><span class="badge badge-blue">${r.time}</span></td>
              <td>${r.students.map(s=>`<span class="chip-tag">${s.name}</span>`).join(' ')}</td>
              <td><span class="badge ${r.type==='1:1'?'badge-purple':'badge-orange'}">${r.type}</span></td>
              <td><span class="badge ${modeColor(r.mode)}">${modeName(r.mode)}</span></td>
              ${co.mode==='online'?`<td><a href="${co.link}" target="_blank" style="color:var(--blue);font-size:12.5px">링크 열기 →</a></td>`:''}
            </tr>
          `).join('')}
          ${myResults.length===0?`<tr><td colspan="6" style="text-align:center;color:var(--t3);padding:24px">매칭된 일정이 없습니다</td></tr>`:''}
        </tbody>
      </table>
    </div>
  </div>

  ${myFailed.length>0?`
  <div class="card" style="border-color:var(--red)">
    <div class="card-header"><div class="card-title" style="color:var(--red)">⚠ 매칭 실패 (${myFailed.length}건)</div></div>
    <div class="card-body">
      ${myFailed.map(f=>`
        <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">
          <span style="font-weight:600">${f.s.name}</span>
          <span class="badge badge-red">${f.reason}</span>
          <span style="font-size:12px;color:var(--t3)">운영진에게 수동 배정 요청 예정</span>
        </div>
      `).join('')}
    </div>
  </div>`:''}
  `
}

function openStudentDetail(id) {
  S.modal = { type:'student-detail', id }
  render()
}

function renderModal() {
  if (!S.modal) return ''
  if (S.modal.type === 'student-detail') return `
    <div class="modal-overlay" onclick="closeModal(event)">
      ${renderStudentDetailModal(S.modal.id)}
    </div>`
  return ''
}

function closeModal(e) {
  if (e.target.classList.contains('modal-overlay') || e.target.classList.contains('modal-close')) {
    S.modal = null
    render()
  }
}

function renderStudentDetailModal(id) {
  const s = getStudent(id)
  return `
  <div class="modal modal-xl" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="S.modal=null;render()">×</button>
    <div class="modal-header">
      <div style="display:flex;align-items:center;gap:14px">
        <div class="applicant-avatar" style="width:52px;height:52px;font-size:20px">${s.name[0]}</div>
        <div>
          <div class="modal-title">${s.name}</div>
          <div class="modal-subtitle">${s.school} · ${s.faculty} · ${s.dept}</div>
        </div>
      </div>
    </div>
    <div class="modal-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div>
          <div class="info-section">
            <div class="info-row"><div class="info-key">생년월일</div><div class="info-val">${s.birth}</div></div>
            <div class="info-row"><div class="info-key">연락처</div><div class="info-val">${s.phone}</div></div>
            <div class="info-row"><div class="info-key">이메일</div><div class="info-val">${s.email}</div></div>
            <div class="info-row"><div class="info-key">주소</div><div class="info-val">${s.addr}</div></div>
          </div>
        </div>
        <div>
          <div class="info-section">
            <div class="info-row"><div class="info-key">포트폴리오</div><div class="info-val"><a href="${s.portfolio}" target="_blank">열기</a></div></div>
            <div class="info-row"><div class="info-key">이력서</div><div class="info-val"><a href="${s.resume}" target="_blank">열기</a></div></div>
            <div class="info-row"><div class="info-key">지원동기</div><div class="info-val">${s.motivation}</div></div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="S.modal=null;render()">닫기</button></div>
  </div>
  `
}

function render() {
  if (!user) return
  document.getElementById('app').innerHTML = renderCompany()
}

render()
</script>
</body>
</html>
